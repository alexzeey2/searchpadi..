<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SearchPadi - Your Search Padi for Trusted Sellers</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Your search padi for trusted sellers. Find verified sellers across Nigeria with AI-powered assistance.">
    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SearchPadi">
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="https://i.postimg.cc/vBGbJsLw/grok-1771024869365-Photoroom-(1).png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/vBGbJsLw/grok-1771024869365-Photoroom-(1).png">
    <link rel="manifest" href="manifest.json">

    <!-- DNS Prefetch -->
    <link rel="preconnect" href="https://fxjnbqymkdvuqfeagpur.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://fxjnbqymkdvuqfeagpur.supabase.co">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://i.supaimg.com">

    <!-- React + ReactDOM -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel (JSX transpiler) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash" style="position:fixed;inset:0;background:#1a1a1a;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;">
        <img src="https://i.postimg.cc/vBGbJsLw/grok-1771024869365-Photoroom-(1).png" style="width:80px;height:80px;border-radius:20px;" />
        <p style="color:#a78bfa;font-size:18px;font-weight:700;font-family:sans-serif;">SearchPadi</p>
        <div style="width:40px;height:3px;background:#7c3aed;border-radius:2px;animation:splashBar 1.2s ease-in-out infinite alternate;"></div>
        <style>@keyframes splashBar{from{width:30px;opacity:.5}to{width:60px;opacity:1}}</style>
    </div>

    <div id="root"></div>

    <!--
        JS FILES load order:
        globals → seller → product → campaign → app → modals (ReactDOM.render last)
    -->
    <script>
        const FILES = [
            'js/globals.js',
            'js/seller.js',
            'js/product.js',
            'js/campaign.js',
            'js/app.js',
            'js/modals.js',
        ];

        async function loadFiles() {
            for (const file of FILES) {
                const res = await fetch(file);
                const code = await res.text();
                const transformed = Babel.transform(code, { presets: ['react'] }).code;
                eval(transformed);
            }
        }

        window.addEventListener('DOMContentLoaded', loadFiles);
    </script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('✅ SW registered:', reg.scope))
                    .catch(err => console.log('❌ SW error:', err));
            });
        }
    </script>
</body>
</html>
