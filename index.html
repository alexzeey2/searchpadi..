<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SearchPadi - Your Search Padi for Trusted Sellers</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Your search padi for trusted sellers. Find verified sellers across Nigeria with AI-powered assistance.">
    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SearchPadi">
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/jpeg" sizes="192x192" href="https://i.supaimg.com/9e62019b-cf4f-4010-9667-57fc56b2769e/dbd35a3c-753b-47ee-aa17-ceff6698b9f6.jpg">
    <link rel="apple-touch-icon" href="https://i.supaimg.com/9e62019b-cf4f-4010-9667-57fc56b2769e/dbd35a3c-753b-47ee-aa17-ceff6698b9f6.jpg">
    <link rel="manifest" href="manifest.json">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
        }
        
        .chat-container {
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
        }
        
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 12px 16px;
            background: #e5e7eb;
            border-radius: 18px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #6b7280;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .message-enter {
            animation: messageSlide 0.3s ease-out;
        }
        
        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .seller-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        
        .seller-card:active {
            transform: scale(0.98);
        }
        
        .product-card {
            transition: transform 0.2s;
            cursor: pointer;
        }

        .product-card:active {
            transform: scale(0.97);
        }

        .floating-add-button {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 999;
            box-shadow: 0 4px 20px rgba(147, 51, 234, 0.4);
            transition: all 0.3s ease;
        }

        .floating-add-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(147, 51, 234, 0.6);
        }

        .floating-add-button:active {
            transform: translateY(0);
        }

        @media (max-width: 500px) {
            .floating-add-button {
                right: 16px;
                bottom: 75px;
            }
        }

        .glowing-search-input {
            box-shadow: 0 0 0 2px rgba(147, 51, 234, 0.3),
                        0 0 10px rgba(147, 51, 234, 0.2);
            animation: glow-pulse 2s ease-in-out infinite;
        }

        .glowing-search-input:focus {
            box-shadow: 0 0 0 2px rgba(147, 51, 234, 0.6),
                        0 0 15px rgba(147, 51, 234, 0.4),
                        0 0 25px rgba(147, 51, 234, 0.2);
            animation: none;
        }

        @keyframes glow-pulse {
            0%, 100% {
                box-shadow: 0 0 0 2px rgba(147, 51, 234, 0.3),
                           0 0 10px rgba(147, 51, 234, 0.2);
            }
            50% {
                box-shadow: 0 0 0 2px rgba(147, 51, 234, 0.5),
                           0 0 15px rgba(147, 51, 234, 0.3),
                           0 0 20px rgba(147, 51, 234, 0.15);
            }
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }
        
        .shimmer {
            animation: shimmer 2s infinite;
            background: linear-gradient(to right, #2a2a2a 4%, #3a3a3a 25%, #2a2a2a 36%);
            background-size: 1000px 100%;
        }
        
        @keyframes slide-up {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        
        .animate-slide-up {
            animation: slide-up 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Initialize Supabase
        const SUPABASE_URL = 'https://fxjnbqymkdvuqfeagpur.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4am5icXlta2R2dXFmZWFncHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMTE0NTUsImV4cCI6MjA4NjU4NzQ1NX0.qcQPStoxVPdJfAEDJ-f0xiu_EQkRnZd2c2uDIhMMAdg';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Phone formatting helper
        const formatPhoneNumber = (phone) => {
            phone = phone.replace(/\D/g, '');
            if (phone.startsWith('0')) phone = phone.substring(1);
            if (phone.startsWith('234')) phone = phone.substring(3);
            return '+234' + phone;
        };

        const WHATSAPP_NUMBER = "+2349058150220";

        // Default placeholder image URLs (will be used as fallbacks)
        const DEFAULT_PROFILE_IMAGE = "https://via.placeholder.com/400x400/6366f1/ffffff?text=Profile";
        const DEFAULT_PRODUCT_IMAGE = "https://via.placeholder.com/400x400/6366f1/ffffff?text=Product";

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [showRegistration, setShowRegistration] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showAddProduct, setShowAddProduct] = useState(false);
            const [showSubscription, setShowSubscription] = useState(false);
            const [showEditProfile, setShowEditProfile] = useState(false);
            const [showAttractCustomers, setShowAttractCustomers] = useState(false);
            
            // Admin states
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [showAdminDashboard, setShowAdminDashboard] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [logoHoldTimer, setLogoHoldTimer] = useState(null);
            
            // Loading states
            const [isRegistering, setIsRegistering] = useState(false);
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const [isUploadingProduct, setIsUploadingProduct] = useState(false);
            const [isLoadingProductView, setIsLoadingProductView] = useState(false);
            
            const [messages, setMessages] = useState([
                { 
                    id: 1, 
                    type: 'assistant', 
                    text: 'Hi! 👋 I\'m Somto, your Search Padi.\n\nYou might like these handpicked items just for you! ✨', 
                    timestamp: new Date(),
                    messageId: 1
                }
            ]);
            const [isTyping, setIsTyping] = useState(false);
            const [currentStep, setCurrentStep] = useState('recommendations');
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [selectedGender, setSelectedGender] = useState(null);
            const [showProducts, setShowProducts] = useState(false);
            const [showSellers, setShowSellers] = useState(false);
            const [displayedProducts, setDisplayedProducts] = useState([]);
            const [allProducts, setAllProducts] = useState([]);
            const [productOffset, setProductOffset] = useState(0);
            const [sellerOffset, setSellerOffset] = useState(0);
            const [showNoMoreMessage, setShowNoMoreMessage] = useState(false);
            const [selectedSeller, setSelectedSeller] = useState(null);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [sellers, setSellers] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchContext, setSearchContext] = useState(null);
            const [clickedButtons, setClickedButtons] = useState({});
            const [isLoadingData, setIsLoadingData] = useState(true);
            const messagesEndRef = useRef(null);

            const PRODUCTS_PER_PAGE = 6;
            const SELLERS_PER_PAGE = 3;

            // Load sellers and products from database on mount
            useEffect(() => {
                loadSellersFromDatabase();
                trackVisit();
            }, []);

            const trackVisit = async () => {
                try {
                    const { data: analytics } = await supabaseClient
                        .from('site_analytics').select('*').eq('id', 1).single();
                    if (!analytics) return;
                    const today = new Date().toISOString().split('T')[0];
                    const daysSincePeriodStart = Math.floor((new Date(today) - new Date(analytics.period_start)) / (1000 * 60 * 60 * 24));
                    const isNewDay = analytics.last_visit_date !== today;
                    const dayOfWeek = new Date().getDay();
                    if (daysSincePeriodStart >= 30) {
                        await supabaseClient.from('site_analytics').update({
                            period_start: today, visits_today: 1, visits_week: 1, visits_month: 1,
                            last_visit_date: today, phones_searches: 0, electronics_searches: 0,
                            shoes_searches: 0, fashion_searches: 0, furniture_searches: 0, foods_searches: 0, beauty_searches: 0, general_searches: 0,
                            updated_at: new Date().toISOString()
                        }).eq('id', 1);
                        return;
                    }
                    await supabaseClient.from('site_analytics').update({
                        visits_today: isNewDay ? 1 : analytics.visits_today + 1,
                        visits_week: (isNewDay && dayOfWeek === 1) ? 1 : analytics.visits_week + 1,
                        visits_month: analytics.visits_month + 1,
                        last_visit_date: today,
                        updated_at: new Date().toISOString()
                    }).eq('id', 1);
                } catch (e) { /* silently fail */ }
            };

            const loadSellersFromDatabase = async () => {
                try {
                    setIsLoadingData(true);
                    
                    // Start timer for minimum 5 seconds
                    const startTime = Date.now();
                    
                    // Fetch ALL sellers (so buyers see all available sellers)
                    const { data: sellersData, error: sellersError } = await supabaseClient
                        .from('profiles')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (sellersError) throw sellersError;
                    
                    // Fetch ALL products
                    const { data: productsData, error: productsError } = await supabaseClient
                        .from('products')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (productsError) throw productsError;
                    
                    // Map sellers with their products
                    const mappedSellers = (sellersData || []).map(seller => {
                        // Check if free trial is active
                        const isTrusted = seller.is_free_trial && seller.free_trial_expires_at 
                            ? new Date(seller.free_trial_expires_at) > new Date()
                            : seller.subscription_plan === 'growth_pro';
                        
                        return {
                            id: seller.id,
                            name: seller.business_name,
                            email: seller.email,
                            category: seller.category,
                            gender: seller.gender || null,
                            location: seller.location,
                            bio: seller.bio || "Seller on SearchPadi",
                            isVerified: seller.is_verified || false,
                            isTrusted: isTrusted,
                            isFreeTrial: seller.is_free_trial || false,
                            freeTrialExpiresAt: seller.free_trial_expires_at,
                            whatsappNumber: seller.whatsapp,
                            profilePhoto: seller.profile_photo || DEFAULT_PROFILE_IMAGE,
                            views: seller.views || 0,
                            subscription: seller.subscription_plan || 'free',
                            shareCount: seller.share_count || 0,
                            tempVerifiedUntil: seller.temp_verified_until || null,
                            products: (productsData || [])
                                .filter(p => p.seller_id === seller.id)
                                .map(product => ({
                                    id: product.id,
                                    name: product.name,
                                    price: product.price || 'Ask for Price',
                                    description: product.description || '',
                                    images: product.images || [DEFAULT_PRODUCT_IMAGE],
                                    keywords: product.keywords || [],
                                    likes: product.likes || 0,
                                    liked: false,
                                    isTrusted: isTrusted && product.is_trusted
                                }))
                        };
                    });
                    
                    // Calculate remaining time to reach 5 seconds
                    const elapsedTime = Date.now() - startTime;
                    const remainingTime = Math.max(5000 - elapsedTime, 0);
                    
                    // Wait for remaining time if less than 5 seconds have passed
                    if (remainingTime > 0) {
                        await new Promise(resolve => setTimeout(resolve, remainingTime));
                    }
                    
                    setSellers(mappedSellers);
                    console.log('✅ Loaded', mappedSellers.length, 'sellers with products');
                    
                } catch (error) {
                    console.error('Error loading data from database:', error);
                    
                    // Even on error, wait for minimum 5 seconds
                    const elapsedTime = Date.now() - startTime;
                    const remainingTime = Math.max(5000 - elapsedTime, 0);
                    if (remainingTime > 0) {
                        await new Promise(resolve => setTimeout(resolve, remainingTime));
                    }
                    
                    // Show empty state, not error
                    setSellers([]);
                } finally {
                    setIsLoadingData(false);
                }
            };

            // Shuffle array utility function
            const shuffleArray = (array) => {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            };

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, isTyping, showProducts, showSellers]);

            // Load initial recommended products
            useEffect(() => {
                if (currentStep === 'recommendations' && displayedProducts.length === 0 && sellers.length > 0 && !isLoadingData) {
                    // Get all products from all sellers
                    const allProductsList = [];
                    sellers.forEach(seller => {
                        seller.products.forEach(product => {
                            allProductsList.push({
                                ...product,
                                seller: seller
                            });
                        });
                    });

                    if (allProductsList.length === 0) {
                        // Sellers exist but no products yet
                        setMessages([
                            { 
                                id: 1, 
                                type: 'assistant', 
                                text: 'Hi! 👋 I\'m Somto, your Search Padi.\n\nOur sellers are setting up their products. Check back soon! ✨', 
                                timestamp: new Date(),
                                messageId: 1
                            }
                        ]);
                        setShowProducts(false);
                        return;
                    }

                    // Shuffle and take first 4
                    const shuffled = shuffleArray(allProductsList);
                    const recommended = shuffled.slice(0, 4);
                    
                    setDisplayedProducts(recommended);
                    setShowProducts(true);
                } else if (currentStep === 'recommendations' && sellers.length === 0 && !isLoadingData) {
                    // Truly no sellers at all - marketplace is empty
                    setMessages([
                        { 
                            id: 1, 
                            type: 'assistant', 
                            text: 'Hi! 👋 I\'m Somto, your Search Padi.\n\n🚀 Be the first! Click "Become a Seller" to start.', 
                            timestamp: new Date(),
                            messageId: 1
                        }
                    ]);
                }
            }, [currentStep, sellers, isLoadingData]);

            const addMessage = (text, type = 'assistant', buttons = null) => {
                const messageId = messages.length + 1;
                setMessages(prev => [...prev, {
                    id: messageId,
                    type,
                    text,
                    buttons,
                    messageId,
                    timestamp: new Date()
                }]);
                return messageId;
            };

            const simulateTyping = async (duration = 1200) => {
                setIsTyping(true);
                await new Promise(resolve => setTimeout(resolve, duration));
                setIsTyping(false);
            };

            const detectCategory = (query) => {
                const queryLower = query.toLowerCase();
                
                if (queryLower.match(/phone|iphone|samsung|tablet|ipad|mobile|smartphone|galaxy/)) {
                    return 'phones';
                } else if (queryLower.match(/laptop|computer|macbook|gaming|ps5|electronics/)) {
                    return 'electronics';
                } else if (queryLower.match(/shoe|sneaker|heel|boot|sandal|footwear/)) {
                    return 'shoes';
                } else if (queryLower.match(/cloth|fashion|dress|shirt|trouser|wear/)) {
                    return 'fashion';
                } else if (queryLower.match(/furniture|sofa|bed|table|chair|fridge/)) {
                    return 'furniture';
                }
                
                return null;
            };

            const scoreProduct = (product, searchTerms) => {
                let score = 0;
                const productText = (product.name + ' ' + product.keywords.join(' ')).toLowerCase();
                
                searchTerms.forEach(term => {
                    if (productText.includes(term)) {
                        score += 1;
                        if (product.name.toLowerCase().includes(term)) {
                            score += 2;
                        }
                    }
                });

                return score;
            };

            const getAllProducts = (category, gender = null, searchTerms = null) => {
                const allProds = [];

                sellers
                    .filter(s => {
                        if (s.category !== category) return false;
                        if (gender && s.gender && s.gender !== 'both' && s.gender !== gender) return false;
                        return true;
                    })
                    .forEach(seller => {
                        seller.products.forEach(product => {
                            const relevanceScore = searchTerms ? scoreProduct(product, searchTerms) : 0;
                            allProds.push({
                                ...product,
                                seller: seller,
                                relevanceScore
                            });
                        });
                    });

                if (searchTerms) {
                    const matchedProducts = allProds.filter(p => p.relevanceScore > 0);
                    if (matchedProducts.length > 0) {
                        return shuffleArray(matchedProducts.sort((a, b) => b.relevanceScore - a.relevanceScore));
                    }
                }
                
                return shuffleArray(allProds);
            };

            const resetToInitialState = () => {
                setMessages([]);
                setCurrentStep('category');
                setSelectedCategory(null);
                setSelectedGender(null);
                setShowProducts(false);
                setShowSellers(false);
                setDisplayedProducts([]);
                setAllProducts([]);
                setProductOffset(0);
                setSellerOffset(0);
                setShowNoMoreMessage(false);
                setSelectedSeller(null);
                setSelectedProduct(null);
                setSearchContext(null);
                setClickedButtons({});
            };

            const handleSearch = async () => {
                const query = searchQuery.trim();
                if (!query) return;

                resetToInitialState();

                setMessages([{ id: 1, type: 'user', text: query, timestamp: new Date(), messageId: 1 }]);
                setSearchQuery('');
                await simulateTyping(1000);

                const searchTerms = query.toLowerCase().split(' ').filter(term => term.length > 2);
                
                const allProductsAcrossCategories = [];
                sellers.forEach(seller => {
                    seller.products.forEach(product => {
                        const relevanceScore = scoreProduct(product, searchTerms);
                        if (relevanceScore > 0) {
                            allProductsAcrossCategories.push({
                                ...product,
                                seller: seller,
                                relevanceScore
                            });
                        }
                    });
                });

                if (allProductsAcrossCategories.length > 0) {
                    const sortedProducts = shuffleArray(
                        allProductsAcrossCategories.sort((a, b) => b.relevanceScore - a.relevanceScore)
                    );
                    
                    addMessage(`Here's what I found!\nDo they match what you're looking for?`, 'assistant');
                    await simulateTyping(1000);
                    
                    setAllProducts(sortedProducts);
                    setDisplayedProducts(sortedProducts.slice(0, PRODUCTS_PER_PAGE));
                    setProductOffset(PRODUCTS_PER_PAGE);
                    setShowProducts(true);
                    setCurrentStep('products');
                    setSearchContext({ query, searchTerms });
                    return;
                }

                const detectedCategory = detectCategory(query);
                
                if (detectedCategory) {
                    setSearchContext({ query, searchTerms });
                    setSelectedCategory(detectedCategory);
                    
                    if (detectedCategory === 'shoes' || detectedCategory === 'fashion') {
                        setCurrentStep('gender');
                        addMessage(`Great! I found what you're looking for 🎯\n\nAre you shopping for:`, 'assistant', [
                            { text: '👨 Male', value: 'male' },
                            { text: '👩 Female', value: 'female' },
                            { text: '👥 Both', value: 'both' }
                        ]);
                    } else {
                        showProductsForCategory(detectedCategory, null, searchTerms);
                    }
                } else {
                    addMessage(`I'd love to help you find what you're looking for! 😊\n\nCould you be more specific? For example:\n• "iPhone 13"\n• "Gaming laptop"\n• "Nike sneakers"\n\nOr choose a category to browse:`, 'assistant', [
                        { text: '📱 Phones & Gadgets', value: 'phones' },
                        { text: '💻 Electronics', value: 'electronics' },
                        { text: '👟 Shoes & Footwear', value: 'shoes' },
                        { text: '👔 Clothes & Fashion', value: 'fashion' },
                        { text: '🏠 Home & Furniture', value: 'furniture' },
                        { text: '🍕 Foods & Edibles', value: 'foods' },
                        { text: '💄 Beauty & Personal Care', value: 'beauty' },
                        { text: '🛒 General Store', value: 'general' }
                    ]);
                }
            };

            const showProductsForCategory = async (category, gender = null, searchTerms = null) => {
                await simulateTyping(800);
                
                const products = getAllProducts(category, gender, searchTerms);
                const shuffledProducts = shuffleArray(products);

                if (shuffledProducts.length > 0) {
                    if (searchContext) {
                        addMessage(`Here's what I found!\nDo they match what you're looking for?`, 'assistant');
                    } else {
                        addMessage(`Here's what I found!\nDo they match what you're looking for?`, 'assistant');
                    }
                    await simulateTyping(1000);
                    
                    setAllProducts(shuffledProducts);
                    setDisplayedProducts(shuffledProducts.slice(0, PRODUCTS_PER_PAGE));
                    setProductOffset(PRODUCTS_PER_PAGE);
                    setShowProducts(true);
                    setCurrentStep('products');
                } else {
                    if (searchContext) {
                        addMessage(`I couldn't find products matching "${searchContext.query}". Let me show you our verified sellers who might have what you need.`, 'assistant');
                    } else {
                        addMessage(`No products available yet. Let me show you our verified sellers.`, 'assistant');
                    }
                    await simulateTyping(1000);
                    setCurrentStep('sellers');
                    setShowSellers(true);
                    setSellerOffset(SELLERS_PER_PAGE);
                }
            };

            const trackCategorySearch = async (category) => {
                try {
                    const { data: analytics } = await supabaseClient
                        .from('site_analytics').select('*').eq('id', 1).single();
                    if (!analytics) return;
                    const field = category + '_searches';
                    if (analytics[field] !== undefined) {
                        await supabaseClient.from('site_analytics')
                            .update({ [field]: analytics[field] + 1, updated_at: new Date().toISOString() })
                            .eq('id', 1);
                    }
                } catch (e) { /* silently fail */ }
            };

            const handleCategorySelect = async (category, displayName, messageId) => {
                setClickedButtons(prev => ({ ...prev, [messageId]: true }));
                addMessage(displayName, 'user');
                trackCategorySearch(category);
                await simulateTyping();

                setSelectedCategory(category);
                
                if (category === 'shoes' || category === 'fashion') {
                    setCurrentStep('gender');
                    addMessage(`Perfect choice! 😊 Are you shopping for:`, 'assistant', [
                        { text: '👨 Male', value: 'male' },
                        { text: '👩 Female', value: 'female' },
                        { text: '👥 Both', value: 'both' }
                    ]);
                } else {
                    showProductsForCategory(category);
                }
            };

            const handleGenderSelect = async (gender, displayName, messageId) => {
                setClickedButtons(prev => ({ ...prev, [messageId]: true }));
                addMessage(displayName, 'user');
                
                setSelectedGender(gender);
                const searchTerms = searchContext ? searchContext.searchTerms : null;
                showProductsForCategory(selectedCategory, gender, searchTerms);
            };

                const seller = currentSellers.find(s => s.id === sellerId);
                const product = seller?.products.find(p => p.id === productId);
                if (!product) return;

                const newLiked = !product.liked;
                const newLikes = newLiked ? product.likes + 1 : Math.max(0, product.likes - 1);

                // Update all state synchronously before any async call
                setSellers(prev => prev.map(s => {
                    if (s.id !== sellerId) return s;
                    return {
                        ...s,
                        products: s.products.map(p =>
                            p.id === productId ? { ...p, liked: newLiked, likes: newLikes } : p
                        )
                    };
                }));

                setDisplayedProducts(prev => prev.map(p =>
                    (p.seller.id === sellerId && p.id === productId)
                        ? { ...p, liked: newLiked, likes: newLikes }
                        : p
                ));

                setSelectedProduct(prev =>
                    (prev && prev.id === productId)
                        ? { ...prev, liked: newLiked, likes: newLikes }
                        : prev
                );

                // Save to Supabase silently - no revert on failure so UI stays correct
                supabaseClient
                    .from('products')
                    .update({ likes: newLikes })
                    .eq('id', productId)
                    .then(({ error }) => {

            const categories = [

                { value: 'electronics', label: '💻 Electronics' },
                { value: 'shoes', label: '👟 Shoes & Footwear' },
                { value: 'fashion', label: '👔 Clothes & Fashion' },
                { value: 'furniture', label: '🏠 Home & Furniture' },
                { value: 'foods', label: '🍕 Foods & Edibles' },
                { value: 'beauty', label: '💄 Beauty & Personal Care' },
                { value: 'general', label: '🛒 General Store' },
            ];

            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024) { setError('Photo must be under 5MB'); return; }
                const reader = new FileReader();
                reader.onloadend = () => {
                    setPhotoPreview(reader.result);
                    setForm(f => ({ ...f, profilePhoto: reader.result }));
                };
                reader.readAsDataURL(file);
            };

            const handleSave = async () => {
                if (!form.businessName.trim()) { setError('Business name is required'); return; }
                if (!form.whatsappNumber.trim()) { setError('WhatsApp number is required'); return; }
                setSaving(true);
                setError('');
                try {
                    await onSave(form);
                    onClose();
                } catch (err) {
                    setError(err.message || 'Failed to save. Try again.');
                    setSaving(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-[#1a1a1a] z-[200] flex flex-col overflow-hidden">
                    <div className="bg-[#1a1a1a] p-4 border-b border-gray-800 flex justify-between items-center">

                                    <span className="text-white text-sm">✎</span>
                                    <input type="file" accept="image/*" className="hidden" onChange={handlePhotoUpload} />
                                </label>
                            </div>
                            <p className="text-gray-400 text-xs">Tap pencil to change photo</p>
                        </div>

                        {/* Business Name */}
                        <div>
                            <label className="block text-sm font-semibold text-gray-300 mb-1">Business Name *</label>
                            <input
                                type="text"
                                value={form.businessName}
                                onChange={e => setForm(f => ({ ...f, businessName: e.target.value }))}
                                className="w-full bg-[#2a2a2a] border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors"
                                placeholder="Your business name"

                            <label className="block text-sm font-semibold text-gray-300 mb-1">Bio</label>

        function AttractCustomersModal({ seller, onClose, onShare }) {
            const isTempVerified = seller.tempVerifiedUntil && new Date(seller.tempVerifiedUntil) > new Date();
            const tempDaysLeft = seller.tempVerifiedUntil
                ? Math.ceil((new Date(seller.tempVerifiedUntil) - new Date()) / (1000 * 60 * 60 * 24))

            const shareCount = seller.shareCount || 0;
            const appUrl = 'https://searchpadi-phi.vercel.app';
            const shareMsg = 'Hi! 👋 Visit ' + appUrl + ' to find my products on SearchPadi!\n\nSearchPadi\'s AI assistant Somto will help you find exactly what you need from my store. Just tell Somto what you\'re looking for! 🛍️';

            const handleWhatsAppShare = () => {
                onShare();
                onClose();
            };

            const [copied, setCopied] = React.useState(false);
            const handleCopyLink = () => {
                const fallback = (str) => {
                    const el = document.createElement('textarea');
                    el.value = str;
                    el.style.position = 'fixed';
                    el.style.opacity = '0';
                    document.body.appendChild(el);
                    el.focus();
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                };
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(shareMsg).then(() => {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    }).catch(() => {
                        fallback(shareMsg);
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    });
                } else {
                    fallback(shareMsg);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }
            };
            const handleSMSShare = () => {
                window.location.href = 'sms:?body=' + encodeURIComponent(shareMsg);
            };

            return (
                <div className="fixed inset-0 z-[150] flex flex-col justify-end" onClick={onClose}>
                    {/* Backdrop */}
                    <div className="absolute inset-0 bg-black/60"></div>

                    {/* Slide-up panel */}

                        className="relative bg-[#1a1a1a] rounded-t-3xl p-6 pb-10 border-t border-gray-800"
                        style={{ animation: 'slideUp 0.3s ease-out' }}
                        onClick={e => e.stopPropagation()}
                    >
                        {/* Handle bar */}

                        {/* Badge status */}
                        {isTempVerified ? (
                            <div className={`rounded-xl p-3 mb-5 flex items-center gap-3 ${tempDaysLeft <= 1 ? 'bg-yellow-900/30 border border-yellow-700/50' : 'bg-green-900/30 border border-green-700/50'}`}>

                                <div>
                                    <p className={`text-sm font-bold ${tempDaysLeft <= 1 ? 'text-yellow-400' : 'text-green-400'}`}>
                                        {tempDaysLeft <= 1 ? 'Your verified badge expires today!' : `Verified badge active — ${tempDaysLeft} day${tempDaysLeft !== 1 ? 's' : ''} left`}
                                    </p>
                                    <p className="text-gray-400 text-xs mt-0.5">Share again to extend by 1 more day</p>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-purple-900/20 border border-purple-700/40 rounded-xl p-3 mb-5 flex items-center gap-3">
                                <div className="w-8 h-8 bg-purple-900/60 rounded-full flex items-center justify-center"><svg className="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg></div>
                                <div>
                                    <p className="text-purple-300 text-sm font-bold">Share to earn your Verified badge!</p>
                                    <p className="text-gray-400 text-xs mt-0.5">Each share = 1 day of Verified + Trusted badge</p>
                                </div>
                            </div>
                        )}

                        <h3 className="text-white font-bold text-lg mb-1">Attract Customers</h3>
                        <p className="text-gray-400 text-sm mb-5">Share this message with your customers. Our AI Somto will convince them to buy from your store.</p>

                        {/* Message preview */}
                        <div className="bg-[#2a2a2a] rounded-2xl p-4 mb-5 border border-gray-700">
                            <p className="text-xs text-gray-500 mb-2 font-semibold uppercase tracking-wide">Message Preview</p>

                                Hi! Visit <span className="text-purple-400 font-medium">{appUrl}</span> to find my products on SearchPadi!

                        {shareCount > 0 && (

        // Product Detail Component
        function ProductDetail({ product, onClose, onSellerClick, onWhatsApp, onToggleLike }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [touchStart, setTouchStart] = useState(0);
            const [touchEnd, setTouchEnd] = useState(0);
            const [showDescriptionModal, setShowDescriptionModal] = useState(false);
            const [liked, setLiked] = useState(false);
            const [likesCount, setLikesCount] = useState(product.likes || 0);

            const handleLike = () => {
                const newLiked = !liked;
                const newCount = newLiked ? likesCount + 1 : Math.max(0, likesCount - 1);
                setLiked(newLiked);
                setLikesCount(newCount);
                // Save to Supabase silently
                supabaseClient
                    .from('products')
                    .update({ likes: newCount })
                    .eq('id', product.id)
                    .then(({ error }) => { if (error) console.error('Likes error:', error); });
            };

            const minSwipeDistance = 50;

            const handleTouchStart = (e) => {
                setTouchEnd(0);
                setTouchStart(e.targetTouches[0].clientX);
            };

            const handleTouchMove = (e) => {
                setTouchEnd(e.targetTouches[0].clientX);
            };

            const handleTouchEnd = () => {
                if (!touchStart || !touchEnd) return;
                
                const distance = touchStart - touchEnd;
                const isLeftSwipe = distance > minSwipeDistance;
                const isRightSwipe = distance < -minSwipeDistance;

                if (isLeftSwipe && currentIndex < product.images.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                }
                if (isRightSwipe && currentIndex > 0) {
                    setCurrentIndex(currentIndex - 1);
                }
            };

            const handleLeftClick = (e) => {
                e.stopPropagation();
                if (currentIndex > 0) {
                    setCurrentIndex(currentIndex - 1);
                }
            };

            const handleRightClick = (e) => {
                e.stopPropagation();
                if (currentIndex < product.images.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                }
            };

            return (
                <div className="fixed inset-0 bg-black z-[60]" onClick={onClose}>
                    <div className="relative w-full h-full flex items-center justify-center bg-black">
                        {/* Image Display */}
                        <div 
                            className="w-full h-full flex items-center justify-center" 
                            onTouchStart={handleTouchStart}
                            onTouchMove={handleTouchMove}
                            onTouchEnd={handleTouchEnd}

                                src={product.images[currentIndex]}

            const compressImage = (file, maxWidth = 800, quality = 0.7) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            if (width > maxWidth) {
                                height = (height * maxWidth) / width;
                                width = maxWidth;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', quality));
                        };
                        img.onerror = reject;
                        img.src = e.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });

        function LoginModal({ onClose, onLoginSuccess, onSwitchToRegister }) {
            const [formData, setFormData] = useState({
                email: '',
                password: ''
            });
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                
                if (!formData.email || !formData.password) {
                    setError('Please fill in all fields');
                    return;
                }
                
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(formData.email)) {
                    setError('Please enter a valid email address');
                    return;
                }
                
                setIsLoading(true);
                
                try {
                    const { data, error: authError } = await supabaseClient.auth.signInWithPassword({
                        email: formData.email,
                        password: formData.password
                    });
                    
                    if (authError) throw authError;
                    
                    const { data: profile, error: profileError } = await supabaseClient
                        .from('profiles')
                        .select('*')
                        .eq('id', data.user.id)
                        .single();
                    
                    if (profileError) {
                        console.error('Profile fetch error:', profileError);
                        throw new Error('Could not load profile. Please contact support.');
                    }
                    
                    // Fetch user's products
                    const { data: products, error: productsError } = await supabaseClient
                        .from('products')
                        .select('*')
                        .eq('seller_id', profile.id);
                    
                    const sellerData = {
                        id: profile.id,
                        name: profile.business_name,
                        email: profile.email,
                        category: profile.category,
                        gender: profile.gender || null,

            ]);
            const [uploadingIndex, setUploadingIndex] = useState(null);
            const fileInputRefs = [useRef(null), useRef(null), useRef(null), useRef(null)];

            const compressImage = (file, maxWidth = 800, quality = 0.7) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            
                            if (width > maxWidth) {
                                height = (height * maxWidth) / width;
                                width = maxWidth;
                            }
                            
                            canvas.width = width;
                            canvas.height = height;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                            resolve(compressedBase64);
                        };
                        img.onerror = reject;
                        img.src = e.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.name) {
                    alert('Please fill in all required fields');
                    return;

                    price: 'Ask for Price', 
                    images: previewImages,
                    description: formData.description 
                });
            };

                const file = e.target.files[0];
                if (file) {
                    if (file.size > 5 * 1024 * 1024) {
                        alert('Image size must be less than 5MB');
                        return;
                    }
                    
                    try {
                        setUploadingIndex(index);
                        const compressedBase64 = await compressImage(file, 800, 0.7);
                        
                        const newPreviews = [...previewImages];
                        newPreviews[index] = compressedBase64;
                        setPreviewImages(newPreviews);
                        
                        const newImages = [...formData.images];
                        newImages[index] = compressedBase64;
                        setFormData({ ...formData, images: newImages });
                        
                        setUploadingIndex(null);
                    } catch (error) {
                        console.error('Image compression error:', error);
                        alert('Failed to process image. Please try another image.');
                        setUploadingIndex(null);
                    }
                }
            };

            return (

        // Admin Login Modal

        // Admin Dashboard Component
        function AdminDashboard({ onClose }) {
            const [stats, setStats] = useState({ total_profit: 0, total_ad_budget: 0, phones_ad_budget: 0, electronics_ad_budget: 0, shoes_ad_budget: 0, fashion_ad_budget: 0, furniture_ad_budget: 0, foods_ad_budget: 0, beauty_ad_budget: 0, general_ad_budget: 0 });
            const [analytics, setAnalytics] = useState({ visits_today: 0, visits_week: 0, visits_month: 0, period_start: null, phones_searches: 0, electronics_searches: 0, shoes_searches: 0, fashion_searches: 0, furniture_searches: 0, foods_searches: 0, beauty_searches: 0, general_searches: 0 });
            const [pendingPayments, setPendingPayments] = useState([]);
            const [pendingAccounts, setPendingAccounts] = useState([]);
            const [totalSellers, setTotalSellers] = useState(0);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [showAdBudgetBreakdown, setShowAdBudgetBreakdown] = useState(false);
            const [runningCampaigns, setRunningCampaigns] = useState([]);
            const [completedCampaigns, setCompletedCampaigns] = useState([]);
            const [showSellersByCategory, setShowSellersByCategory] = useState(false);
            const [sellersByCategory, setSellersByCategory] = useState({});
            const [selectedSeller, setSelectedSeller] = useState(null);
            const [activeTab, setActiveTab] = useState('accounts');
            const [balanceView, setBalanceView] = useState('total'); // 'total' | 'period'

            const formatCount = (n) => {
                if (n >= 1000000) return (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 1) + 'M';
                if (n >= 1000) return (n / 1000).toFixed(n % 1000 === 0 ? 0 : 1) + 'K';
                return n.toString();
            };

            useEffect(() => {
                loadAdminData();
            }, []);

            const loadAdminData = async () => {
                try {
                    const { data: statsData } = await supabaseClient
                        .from('admin_stats')
                        .select('*')
                        .eq('id', 1)
                        .single();
                    if (statsData) setStats(statsData);

                    const { data: analyticsData } = await supabaseClient
                        .from('site_analytics')
                        .select('*')
                        .eq('id', 1)
                        .single();
                    if (analyticsData) setAnalytics(analyticsData);

                    const { data: paymentsData } = await supabaseClient
                        .from('pending_payments')
                        .select('*')
                        .eq('status', 'pending')
                        .order('created_at', { ascending: false });
                    if (paymentsData) setPendingPayments(paymentsData);

                    // Load running campaigns (approved, not yet expired)
                    const { data: runningData } = await supabaseClient
                        .from('pending_payments')
                        .select('*')
                        .eq('status', 'approved')
                        .order('approved_at', { ascending: false });
                    if (runningData) {
                        // For any campaign missing seller_whatsapp, fetch from profiles
                        const enriched = await Promise.all(runningData.map(async (c) => {
                            if (!c.seller_whatsapp && c.seller_id) {
                                const { data: profile } = await supabaseClient
                                    .from('profiles')
                                    .select('whatsapp')
                                    .eq('id', c.seller_id)
                                    .single();
                                return { ...c, seller_whatsapp: profile?.whatsapp || '' };
                            }
                            return c;
                        }));
                        const now = new Date();
                        const running = [];
                        const completed = [];
                        enriched.forEach(c => {
                            const approvedAt = new Date(c.approved_at || c.updated_at);
                            const days = c.plan_type === 'verified_pro' ? 2 : 1;
                            const expiresAt = new Date(approvedAt.getTime() + days * 24 * 60 * 60 * 1000);
                            if (now < expiresAt) {
                                running.push({ ...c, expiresAt });
                            } else {
                                completed.push({ ...c, expiresAt });
                            }
                        });
                        setRunningCampaigns(running);
                        setCompletedCampaigns(completed);
                    }

                    // Load pending accounts (sellers waiting for approval)
                    const { data: accountsData } = await supabaseClient
                        .from('profiles')
                        .select('*')
                        .eq('account_status', 'pending')
                        .order('created_at', { ascending: false });
                    if (accountsData) setPendingAccounts(accountsData);

                    // Count only approved sellers
                    const { count } = await supabaseClient
                        .from('profiles')
                        .select('*', { count: 'exact', head: true })
                        .eq('account_status', 'approved');
                    setTotalSellers(count || 0);

                    // Load sellers grouped by category
                    const { data: categoryData } = await supabaseClient
                        .from('profiles')
                        .select('category')
                        .eq('account_status', 'approved');
                    if (categoryData) {
                        const grouped = categoryData.reduce((acc, s) => {
                            const cat = s.category || 'unknown';
                            acc[cat] = (acc[cat] || 0) + 1;
                            return acc;
                        }, {});
                        setSellersByCategory(grouped);
                    }
                } catch (error) {
                    console.error('Error loading admin data:', error);
                }
            };

            const handleApprove = async (payment) => {
                try {
                    // Step 1: Update seller profile
                    const giveVerified = payment.plan_type === 'verified_pro';
                    const updateData = { subscription_plan: payment.plan_type };
                    if (giveVerified) {
                        updateData.is_verified = true;
                        updateData.temp_verified_until = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString();
                    }
                    const { error: updateError } = await supabaseClient
                        .from('profiles')
                        .update(updateData)
                        .eq('id', payment.seller_id);
                    
                    if (updateError) {
                        alert('❌ Step 1 failed (profile update): ' + updateError.message);
                        return;
                    }

                    // Step 2: Update admin stats - fixed splits per plan
                    // Starter (₦3,900): ₦2,000 ad budget, ₦1,900 profit
                    // Verified Pro (₦7,900): ₦4,000 ad budget, ₦3,900 profit
                    const adBudget = payment.plan_type === 'verified_pro' ? 400000 : 200000;
                    const profit = payment.amount - adBudget;
                    const categoryField = `${payment.category}_ad_budget`;
                    const { error: statsError } = await supabaseClient
                        .from('admin_stats')
                        .update({
                            total_profit: stats.total_profit + profit,
                            total_ad_budget: stats.total_ad_budget + adBudget,
                            [categoryField]: (stats[categoryField] || 0) + adBudget,
                            updated_at: new Date().toISOString()
                        })
                        .eq('id', 1);
                    
                    if (statsError) {
                        alert('❌ Step 2 failed (stats update): ' + statsError.message);
                        return;
                    }

                    // Step 3: Mark payment approved, clear screenshot to save space
                    const { error: paymentError } = await supabaseClient
                        .from('pending_payments')
                        .update({ status: 'approved', approved_at: new Date().toISOString(), payment_screenshot: null })
                        .eq('id', payment.id);
                    
                    if (paymentError) {
                        alert('❌ Step 3 failed (payment status): ' + paymentError.message);
                        return;
                    }

                    loadAdminData();
                    alert('✅ Payment approved and seller activated!');
                } catch (error) {
                    alert('❌ Unexpected error: ' + error.message);
                }
            };

            const handleDecline = async (payment) => {
                if (!confirm('Are you sure you want to decline this payment?')) return;

                try {
                    const { error } = await supabaseClient
                        .from('pending_payments')
                        .update({ status: 'declined', payment_screenshot: null })
                        .eq('id', payment.id);
                    
                    if (error) throw error;

                    loadAdminData();
                    alert('Payment declined');
                } catch (error) {
                    console.error('Error declining payment:', error);
                    alert('Failed to decline payment');
                }
            };

            const handleApproveAccount = async (account) => {
                try {
                    // Approve account + delete video, keep selfie
                    const { error } = await supabaseClient
                        .from('profiles')
                        .update({
                            account_status: 'approved',
                            verification_video: null, // Delete video
                            verified_at: new Date().toISOString()
                        })
                        .eq('id', account.id);
                    
                    if (error) throw error;
                    loadAdminData();
                    alert(`✅ ${account.business_name} has been approved!`);
                } catch (error) {
                    console.error('Error approving account:', error);
                    alert('❌ Failed to approve account');
                }
            };

            const handleDeclineAccount = async (account) => {
                if (!confirm(`Decline ${account.business_name}'s application?`)) return;
                try {
                    const { error } = await supabaseClient
                        .from('profiles')
                        .update({ account_status: 'declined' })
                        .eq('id', account.id);
                    
                    if (error) throw error;
                    loadAdminData();
                    alert(`Account declined.`);
                } catch (error) {
                    console.error('Error declining account:', error);
                    alert('Failed to decline account');
                }
            };

            const handleSearch = async () => {
                if (!searchQuery.trim()) {
                    setSearchResults([]);
                    return;
                }

                try {
                    const { data } = await supabaseClient
                        .from('profiles')
                        .select('*')
                        .or(`business_name.ilike.%${searchQuery}%,email.ilike.%${searchQuery}%`)
                        .limit(10);
                    
                    if (data) {
                        setSearchResults(data);
                    }
                } catch (error) {
                    console.error('Error searching sellers:', error);
                }
            };

            return (
                <div className="fixed inset-0 bg-[#0a0a0a] z-[200] overflow-y-auto">
                    <div className="min-h-screen p-4 md:p-8">
                        {/* Header */}
                        <div className="flex justify-between items-center mb-8 gap-4">
                            <h1 className="text-3xl font-bold text-white">Admin Dashboard</h1>
                            <div className="flex items-center gap-4">
                                {/* Search */}
                                <div className="relative">
                                    <input
                                        type="text"
                                        value={searchQuery}
                                        onChange={(e) => {
                                            setSearchQuery(e.target.value);
                                            if (e.target.value.trim()) {
                                                handleSearch();
                                            } else {
                                                setSearchResults([]);
                                            }
                                        }}
                                        placeholder="Search sellers..."
                                        className="bg-[#1a1a1a] border border-gray-800 text-white px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm w-64"
                                    />
                                    {searchResults.length > 0 && (
                                        <div className="absolute top-full mt-2 w-full bg-[#1a1a1a] border border-gray-800 rounded-lg shadow-2xl max-h-80 overflow-y-auto z-10">
                                            {searchResults.map(seller => (
                                                <div

                                                    onClick={async () => {
                                                        // Load seller products
                                                        const { data: productsData } = await supabaseClient
                                                            .from('products')
                                                            .select('*')
                                                            .eq('seller_id', seller.id);
                                                        
                                                        setSelectedSeller({

                                                                isTrusted: p.is_trusted || false
                                                            }))

                                                        setSearchQuery('');
                                                        setSearchResults([]);
                                                    }}
                                                    className="p-3 hover:bg-[#2a2a2a] cursor-pointer border-b border-gray-800/50 last:border-b-0 flex items-center gap-3"

                                                    <img

                                                        alt={seller.business_name}

                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2">

                                                                    ✓

                                                            )}
                                                        </div>
                                                        <span className="text-gray-400 text-xs">{seller.email}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                </div>
                                <button
