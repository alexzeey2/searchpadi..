                                            <div className="flex items-center justify-between mb-1">
                                                <span className="text-gray-300 text-sm">{label}</span>
                                                <span className="text-white font-bold text-sm">{formatCount(val)} search{val !== 1 ? 'es' : ''}</span>
                                            </div>
                                            <div className="w-full bg-[#2a2a2a] rounded-full h-1.5">
                                                <div className="bg-purple-600 h-1.5 rounded-full transition-all duration-500" style={{ width: pct + '%' }}></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Tabs */}
                        <div className="flex gap-2 mb-4">
                            <button
                                onClick={() => setActiveTab('accounts')}
                                className={`px-5 py-2 rounded-lg font-semibold text-sm transition-colors ${activeTab === 'accounts' ? 'bg-purple-600 text-white' : 'bg-[#1a1a1a] text-gray-400 border border-gray-800 hover:border-purple-500'}`}
                            >
                                Pending Accounts {pendingAccounts.length > 0 && <span className="ml-1 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full">{pendingAccounts.length}</span>}
                            </button>
                            <button
                                onClick={() => setActiveTab('payments')}
                                className={`px-5 py-2 rounded-lg font-semibold text-sm transition-colors ${activeTab === 'payments' ? 'bg-purple-600 text-white' : 'bg-[#1a1a1a] text-gray-400 border border-gray-800 hover:border-purple-500'}`}
                            >
                                Pending {pendingPayments.length > 0 && <span className="ml-1 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full">{pendingPayments.length}</span>}
                            </button>
                            <button
                                onClick={() => setActiveTab('running')}
                                className={`px-5 py-2 rounded-lg font-semibold text-sm transition-colors ${activeTab === 'running' ? 'bg-green-600 text-white' : 'bg-[#1a1a1a] text-gray-400 border border-gray-800 hover:border-purple-500'}`}
                            >
                                Running {runningCampaigns.length > 0 && <span className="ml-1 bg-green-500 text-white text-xs px-1.5 py-0.5 rounded-full">{runningCampaigns.length}</span>}
                            </button>
                            <button
                                onClick={() => setActiveTab('completed')}
                                className={`px-5 py-2 rounded-lg font-semibold text-sm transition-colors ${activeTab === 'completed' ? 'bg-gray-600 text-white' : 'bg-[#1a1a1a] text-gray-400 border border-gray-800 hover:border-purple-500'}`}
                            >
                                Completed
                            </button>
                        </div>

                        {/* Pending Accounts Tab */}
                        {activeTab === 'accounts' && (
                            <div className="bg-[#1a1a1a] border border-gray-800 rounded-xl p-6">
                                <h2 className="text-xl font-bold text-white mb-4">Pending Accounts</h2>
                                {pendingAccounts.length === 0 ? (
                                    <div className="text-center py-12 text-gray-500">No pending accounts</div>
                                ) : (
                                    <div className="space-y-4">
                                        {pendingAccounts.map(account => (
                                            <div key={account.id} className="bg-[#2a2a2a] rounded-xl p-5 border border-gray-700">
                                                {/* Seller Info */}
                                                <div className="flex items-start gap-4 mb-4">
                                                    <img
                                                        src={account.profile_photo || DEFAULT_PROFILE_IMAGE}
                                                        className="w-14 h-14 rounded-full object-cover border-2 border-gray-600"
                                                    />
                                                    <div className="flex-1">
                                                        <h3 className="text-white font-bold text-lg">{account.business_name}</h3>
                                                        <p className="text-gray-400 text-sm">{account.email}</p>
                                                        <p className="text-gray-400 text-sm">{account.location} · {account.category}</p>
                                                        <p className="text-gray-500 text-xs mt-1">{new Date(account.created_at).toLocaleString()}</p>
                                                    </div>
                                                </div>

                                                {/* Selfie + Video Preview */}
                                                <div className="grid grid-cols-2 gap-3 mb-4">
                                                    {/* Selfie */}
                                                    <div>
                                                        <p className="text-gray-400 text-xs mb-2 font-medium">SELFIE PHOTO</p>
                                                        {account.selfie_photo ? (
                                                            <img src={account.selfie_photo} className="w-full h-32 object-cover rounded-lg border border-gray-700" />
                                                        ) : (
                                                            <div className="w-full h-32 bg-[#1a1a1a] rounded-lg border border-gray-700 flex items-center justify-center text-gray-600 text-sm">Not provided</div>
                                                        )}
                                                    </div>
                                                    {/* Video */}
                                                    <div>
                                                        <p className="text-gray-400 text-xs mb-2 font-medium">VERIFICATION VIDEO</p>
                                                        {account.verification_video ? (
                                                            <video
                                                                src={account.verification_video}
                                                                controls
                                                                className="w-full h-32 object-cover rounded-lg border border-gray-700"
                                                            />
                                                        ) : (
                                                            <div className="w-full h-32 bg-[#1a1a1a] rounded-lg border border-gray-700 flex items-center justify-center text-gray-600 text-sm">Not provided</div>
                                                        )}
                                                    </div>
                                                </div>

                                                {/* Note about video deletion */}
                                                <p className="text-yellow-600 text-xs mb-4">⚠️ Approving will delete their video and keep only the selfie as a permanent record.</p>

                                                {/* Actions */}
                                                <div className="flex gap-3">
                                                    <button
                                                        onClick={() => handleApproveAccount(account)}
                                                        className="flex-1 bg-green-600 hover:bg-green-700 text-white py-2.5 rounded-lg font-semibold text-sm transition-colors"
                                                    >
                                                        ✓ Approve
                                                    </button>
                                                    <button
                                                        onClick={() => handleDeclineAccount(account)}
                                                        className="flex-1 bg-red-600/20 hover:bg-red-600/40 text-red-400 py-2.5 rounded-lg font-semibold text-sm transition-colors border border-red-800"
                                                    >
                                                        ✗ Decline
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Pending Subscriptions Tab */}
                        {activeTab === 'payments' && (
                        <div className="bg-[#1a1a1a] border border-gray-800 rounded-xl p-6">
                            <h2 className="text-xl font-bold text-white mb-4">Pending Campaigns</h2>
                            {pendingPayments.length === 0 ? (
                                <div className="text-center py-12 text-gray-500">No pending payments</div>
                            ) : (
                                <div className="space-y-4">
                                    {pendingPayments.map(payment => (
                                        <div key={payment.id} className="bg-[#2a2a2a] rounded-xl p-5 border border-gray-700">
                                            <div className="flex items-start gap-4">
                                                {/* Payment Screenshot */}
                                                <div className="flex-shrink-0">
                                                    {payment.payment_screenshot ? (
                                                        <img 
                                                            src={payment.payment_screenshot} 
                                                            className="w-32 h-32 object-cover rounded-lg border-2 border-purple-500 cursor-pointer hover:scale-105 transition-transform"
                                                            onClick={() => window.open(payment.payment_screenshot, '_blank')}
                                                            title="Click to view full size"
                                                        />
                                                    ) : (
                                                        <div className="w-32 h-32 bg-[#1a1a1a] rounded-lg border border-gray-700 flex items-center justify-center text-gray-600 text-xs">
                                                            No screenshot
                                                        </div>
                                                    )}
                                                </div>

                                                {/* Payment Details */}
                                                <div className="flex-1">
                                                    <h3 className="text-white font-bold text-lg mb-1">{payment.seller_name}</h3>
                                                    <div className="space-y-1 text-sm">
                                                        <p className="text-gray-400">
                                                            <span className="text-gray-500">Plan:</span> 
                                                            <span className="text-white ml-2 capitalize">{payment.plan_type.replace('_', ' ')}</span>
                                                            {payment.product_name && (
                                                                <div className="mt-2 flex items-center gap-2">
                                                                    {payment.product_image && <img src={payment.product_image} className="w-10 h-10 rounded object-cover"/>}
                                                                    <div>
                                                                        <p className="text-gray-500 text-xs">Product to promote</p>
                                                                        <p className="text-white text-sm font-semibold">{payment.product_name}</p>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </p>
                                                        <p className="text-gray-400">
                                                            <span className="text-gray-500">Amount:</span> 
                                                            <span className="text-white ml-2 font-bold">₦{(payment.amount / 100).toLocaleString()}</span>
                                                        </p>
                                                        <p className="text-gray-400">
                                                            <span className="text-gray-500">Email:</span> 
                                                            <span className="text-gray-300 ml-2">{payment.seller_email}</span>
                                                        </p>
                                                        <p className="text-gray-500 text-xs">
                                                            {new Date(payment.payment_timestamp).toLocaleString()}
                                                        </p>
                                                    </div>
                                                </div>

                                                {/* Actions */}
                                                <div className="flex flex-col gap-2 flex-shrink-0">
                                                    <button 
                                                        onClick={() => handleApprove(payment)} 
                                                        className="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg text-sm font-semibold transition-colors whitespace-nowrap"
                                                    >
                                                        ✓ Approve
                                                    </button>
                                                    <button 
                                                        onClick={() => handleDecline(payment)} 
                                                        className="bg-red-600/20 hover:bg-red-600/40 text-red-400 px-5 py-2 rounded-lg text-sm font-semibold transition-colors border border-red-800 whitespace-nowrap"
                                                    >
                                                        ✗ Decline
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        )}

                        {/* Running Campaigns Tab */}
                        {activeTab === 'running' && (
                            <div className="bg-[#1a1a1a] border border-gray-800 rounded-xl p-6">
                                <h2 className="text-xl font-bold text-white mb-4">Running Campaigns</h2>
                                {runningCampaigns.length === 0 ? (
                                    <div className="text-center py-12 text-gray-500">No active campaigns right now</div>
                                ) : (
                                    <div className="space-y-3">
                                        {runningCampaigns.map(campaign => {
                                            const now = new Date();
                                            const msLeft = campaign.expiresAt - now;
                                            const hoursLeft = Math.max(0, Math.ceil(msLeft / (1000 * 60 * 60)));
                                            const isUrgent = hoursLeft <= 3;
                                            const whatsappNum = (campaign.seller_whatsapp || '').replace(/\D/g, '');
                                            return (
                                                <div key={campaign.id} className={`bg-[#2a2a2a] rounded-xl p-4 border ${isUrgent ? 'border-red-700' : 'border-green-800'}`}>
                                                    <div className="flex items-center gap-3">
                                                        {/* Product image */}
                                                        {campaign.product_image && (
                                                            <img src={campaign.product_image} className="w-14 h-14 rounded-lg object-cover flex-shrink-0"/>
                                                        )}
                                                        {/* Info */}
                                                        <div className="flex-1 min-w-0">
                                                            <p className="text-white font-bold truncate">{campaign.seller_name}</p>
                                                            <p className="text-gray-400 text-xs capitalize">{campaign.plan_type.replace('_', ' ')} — {campaign.product_name || 'No product'}</p>
                                                            <div className={`inline-flex items-center gap-1 mt-1 px-2 py-0.5 rounded-full text-xs font-semibold ${isUrgent ? 'bg-red-900/50 text-red-300' : 'bg-green-900/50 text-green-300'}`}>
                                                                <div className={`w-1.5 h-1.5 rounded-full ${isUrgent ? 'bg-red-400' : 'bg-green-400'}`}/>
                                                                {hoursLeft}h remaining
                                                            </div>
                                                        </div>
                                                        {/* WhatsApp button */}
                                                        <a
                                                            href={`https://wa.me/${whatsappNum}`}
                                                            target="_blank"
                                                            className="flex-shrink-0 bg-green-600 hover:bg-green-700 text-white p-2.5 rounded-lg transition-colors"
                                                        >
                                                            <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                                                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                                                            </svg>
                                                        </a>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Completed Campaigns Tab */}
                        {activeTab === 'completed' && (
                            <div className="bg-[#1a1a1a] border border-gray-800 rounded-xl p-6">
                                <h2 className="text-xl font-bold text-white mb-4">Completed Campaigns</h2>
                                {completedCampaigns.length === 0 ? (
                                    <div className="text-center py-12 text-gray-500">No completed campaigns yet</div>
                                ) : (
                                    <div className="space-y-3">
                                        {completedCampaigns.map(campaign => {
                                            const whatsappNum = (campaign.seller_whatsapp || '').replace(/\D/g, '');
                                            return (
                                                <div key={campaign.id} className="bg-[#2a2a2a] rounded-xl p-4 border border-gray-700 opacity-75">
                                                    <div className="flex items-center gap-3">
                                                        {campaign.product_image && (
                                                            <img src={campaign.product_image} className="w-14 h-14 rounded-lg object-cover flex-shrink-0 grayscale"/>
                                                        )}
                                                        <div className="flex-1 min-w-0">
                                                            <p className="text-white font-bold truncate">{campaign.seller_name}</p>
                                                            <p className="text-gray-400 text-xs capitalize">{campaign.plan_type.replace('_', ' ')} — {campaign.product_name || 'No product'}</p>
                                                            <p className="text-gray-600 text-xs mt-1">Ended {campaign.expiresAt.toLocaleDateString()}</p>
                                                        </div>
                                                        <a
                                                            href={`https://wa.me/${whatsappNum}`}
                                                            target="_blank"
                                                            className="flex-shrink-0 bg-gray-700 hover:bg-gray-600 text-white p-2.5 rounded-lg transition-colors"
                                                        >
                                                            <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                                                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                                                            </svg>
                                                        </a>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Ad Budget Breakdown Modal */}
                        {showSellersByCategory && (
                            <div className="fixed inset-0 bg-black/80 z-[210] flex items-center justify-center p-4" onClick={() => setShowSellersByCategory(false)}>
                                <div className="bg-[#1a1a1a] border border-gray-800 rounded-2xl p-6 max-w-md w-full" onClick={(e) => e.stopPropagation()}>
                                    <div className="flex items-center justify-between mb-5">
                                        <h3 className="text-xl font-bold text-white">Sellers by Category</h3>
                                        <span className="bg-blue-900/50 text-blue-300 text-sm font-bold px-3 py-1 rounded-full">{totalSellers} total</span>
                                    </div>
                                    <div className="space-y-3">
                                        {[
                                            { key: 'phones', label: 'Phones & Gadgets' },
                                            { key: 'electronics', label: 'Electronics' },
                                            { key: 'shoes', label: 'Shoes & Footwear' },
                                            { key: 'fashion', label: 'Clothes & Fashion' },
                                            { key: 'furniture', label: 'Home & Furniture' },
                                            { key: 'foods', label: 'Foods & Edibles' },
                                            { key: 'beauty', label: 'Beauty & Personal Care' },
                                            { key: 'general', label: 'General Store' },
                                        ].map(({ key, label }) => {
                                            const count = sellersByCategory[key] || 0;
                                            const pct = totalSellers > 0 ? Math.round((count / totalSellers) * 100) : 0;
                                            return (
                                                <div key={key}>
                                                    <div className="flex items-center justify-between mb-1">
                                                        <span className="text-gray-300 text-sm">{label}</span>
                                                        <span className="text-white font-bold text-sm">{count}</span>
                                                    </div>
                                                    <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden">
                                                        <div className="h-full bg-blue-500 rounded-full transition-all" style={{ width: pct + '%' }}/>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <button onClick={() => setShowSellersByCategory(false)} className="w-full mt-6 bg-gray-800 hover:bg-gray-700 text-white py-2.5 rounded-lg font-semibold text-sm transition-colors">
                                        Close
                                    </button>
                                </div>
                            </div>
                        )}

                        {showAdBudgetBreakdown && (
                            <div className="fixed inset-0 bg-black/80 z-[210] flex items-center justify-center p-4" onClick={() => setShowAdBudgetBreakdown(false)}>
                                <div className="bg-[#1a1a1a] border border-gray-800 rounded-2xl p-6 max-w-md w-full" onClick={(e) => e.stopPropagation()}>
                                    <div className="flex items-center justify-between mb-5">
                                        <h3 className="text-xl font-bold text-white">Ad Budget by Category</h3>
                                        <span className="text-purple-400 font-bold">₦{(stats.total_ad_budget / 100).toLocaleString('en-NG', { minimumFractionDigits: 2 })}</span>
                                    </div>
                                    <div className="space-y-3">
                                        {[
                                            { key: 'phones_ad_budget', label: 'Phones & Gadgets' },
                                            { key: 'electronics_ad_budget', label: 'Electronics' },
                                            { key: 'shoes_ad_budget', label: 'Shoes & Footwear' },
                                            { key: 'fashion_ad_budget', label: 'Clothes & Fashion' },
                                            { key: 'furniture_ad_budget', label: 'Home & Furniture' },
                                            { key: 'foods_ad_budget', label: 'Foods & Edibles' },
                                            { key: 'beauty_ad_budget', label: 'Beauty & Personal Care' },
                                            { key: 'general_ad_budget', label: 'General Store' },
                                        ].map(({ key, label }) => {
                                            const val = stats[key] || 0;
                                            const pct = stats.total_ad_budget > 0 ? Math.round((val / stats.total_ad_budget) * 100) : 0;
                                            return (
                                                <div key={key}>
                                                    <div className="flex items-center justify-between mb-1">
                                                        <span className="text-gray-300 text-sm">{label}</span>
                                                        <span className="text-white font-bold text-sm">₦{(val / 100).toLocaleString('en-NG', { minimumFractionDigits: 2 })}</span>
                                                    </div>
                                                    <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden">
                                                        <div className="h-full bg-purple-500 rounded-full" style={{ width: pct + '%' }}/>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <button
                                        onClick={() => setShowAdBudgetBreakdown(false)}
                                        className="w-full mt-5 bg-gray-800 hover:bg-gray-700 text-white py-2.5 rounded-lg font-semibold text-sm transition-colors"
                                    >
                                        Close
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Seller Profile Modal */}
                        {selectedSeller && (
                            <SellerProfile
                                seller={{
                                    ...selectedSeller,
                                    name: selectedSeller.business_name,
                                    isVerified: selectedSeller.is_verified,
                                    whatsappNumber: selectedSeller.whatsapp,
                                    profilePhoto: selectedSeller.profile_photo,
                                    subscription: selectedSeller.subscription_plan,
                                    products: [] // Admin view doesn't need products loaded
                                }}
                                isOwnProfile={false}
                                onClose={() => setSelectedSeller(null)}
                                onWhatsApp={(seller) => {
                                    window.open(`https://wa.me/${seller.whatsappNumber.replace(/\D/g, '')}`, '_blank');
                                }}
                                onShowSubscription={() => {}}
                                onAddProduct={() => {}}
                                onProductClick={() => {}}
                                onDeleteProduct={() => {}}
                            />
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
        
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('✅ Service Worker registered:', registration);
                    })
                    .catch(error => {
                        console.log('❌ Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
