<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SearchPadi - Nigeria's Trusted Marketplace</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Find verified sellers and products across Nigeria. Your trusted business directory.">
    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SearchPadi">
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="https://i.supaimg.com/9e62019b-cf4f-4010-9667-57fc56b2769e/675e4d2b-c3c2-46d1-bca8-b00cc6dd06ef.png">
    <link rel="apple-touch-icon" href="https://i.supaimg.com/9e62019b-cf4f-4010-9667-57fc56b2769e/675e4d2b-c3c2-46d1-bca8-b00cc6dd06ef.png">
    <link rel="manifest" href="manifest.json">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
        }
        
        .chat-container {
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
        }
        
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 12px 16px;
            background: #e5e7eb;
            border-radius: 18px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #6b7280;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .message-enter {
            animation: messageSlide 0.3s ease-out;
        }
        
        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .seller-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        
        .seller-card:active {
            transform: scale(0.98);
        }
        
        .product-card {
            transition: transform 0.2s;
            cursor: pointer;
        }

        .product-card:active {
            transform: scale(0.97);
        }

        .floating-add-button {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 999;
            box-shadow: 0 4px 20px rgba(147, 51, 234, 0.4);
            transition: all 0.3s ease;
        }

        .floating-add-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(147, 51, 234, 0.6);
        }

        .floating-add-button:active {
            transform: translateY(0);
        }

        @media (max-width: 500px) {
            .floating-add-button {
                right: 16px;
                bottom: 75px;
            }
        }

        .glowing-search-input {
            box-shadow: 0 0 0 2px rgba(147, 51, 234, 0.3),
                        0 0 10px rgba(147, 51, 234, 0.2);
            animation: glow-pulse 2s ease-in-out infinite;
        }

        .glowing-search-input:focus {
            box-shadow: 0 0 0 2px rgba(147, 51, 234, 0.6),
                        0 0 15px rgba(147, 51, 234, 0.4),
                        0 0 25px rgba(147, 51, 234, 0.2);
            animation: none;
        }

        @keyframes glow-pulse {
            0%, 100% {
                box-shadow: 0 0 0 2px rgba(147, 51, 234, 0.3),
                           0 0 10px rgba(147, 51, 234, 0.2);
            }
            50% {
                box-shadow: 0 0 0 2px rgba(147, 51, 234, 0.5),
                           0 0 15px rgba(147, 51, 234, 0.3),
                           0 0 20px rgba(147, 51, 234, 0.15);
            }
        }
        
        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }
        
        .shimmer {
            animation: shimmer 2s infinite;
            background: linear-gradient(to right, #2a2a2a 4%, #3a3a3a 25%, #2a2a2a 36%);
            background-size: 1000px 100%;
        }
        
        @keyframes slide-up {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        
        .animate-slide-up {
            animation: slide-up 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Initialize Supabase
        const SUPABASE_URL = 'https://fxjnbqymkdvuqfeagpur.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4am5icXlta2R2dXFmZWFncHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMTE0NTUsImV4cCI6MjA4NjU4NzQ1NX0.qcQPStoxVPdJfAEDJ-f0xiu_EQkRnZd2c2uDIhMMAdg';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Phone formatting helper
        const formatPhoneNumber = (phone) => {
            phone = phone.replace(/\D/g, '');
            if (phone.startsWith('0')) phone = phone.substring(1);
            if (phone.startsWith('234')) phone = phone.substring(3);
            return '+234' + phone;
        };

        const WHATSAPP_NUMBER = "+2349058150220";

        // Default placeholder image URLs (will be used as fallbacks)
        const DEFAULT_PROFILE_IMAGE = "https://via.placeholder.com/400x400/6366f1/ffffff?text=Profile";
        const DEFAULT_PRODUCT_IMAGE = "https://via.placeholder.com/400x400/6366f1/ffffff?text=Product";

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [showRegistration, setShowRegistration] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showAddProduct, setShowAddProduct] = useState(false);
            const [showSubscription, setShowSubscription] = useState(false);
            
            // Loading states
            const [isRegistering, setIsRegistering] = useState(false);
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const [isUploadingProduct, setIsUploadingProduct] = useState(false);
            const [isLoadingProductView, setIsLoadingProductView] = useState(false);
            
            const [messages, setMessages] = useState([
                { 
                    id: 1, 
                    type: 'assistant', 
                    text: 'Hello! 👋 Welcome to SearchPadi.\n\nYou might like these handpicked items just for you! ✨', 
                    timestamp: new Date(),
                    messageId: 1
                }
            ]);
            const [isTyping, setIsTyping] = useState(false);
            const [currentStep, setCurrentStep] = useState('recommendations');
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [selectedGender, setSelectedGender] = useState(null);
            const [showProducts, setShowProducts] = useState(false);
            const [showSellers, setShowSellers] = useState(false);
            const [displayedProducts, setDisplayedProducts] = useState([]);
            const [allProducts, setAllProducts] = useState([]);
            const [productOffset, setProductOffset] = useState(0);
            const [sellerOffset, setSellerOffset] = useState(0);
            const [showNoMoreMessage, setShowNoMoreMessage] = useState(false);
            const [selectedSeller, setSelectedSeller] = useState(null);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [sellers, setSellers] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchContext, setSearchContext] = useState(null);
            const [clickedButtons, setClickedButtons] = useState({});
            const [isLoadingData, setIsLoadingData] = useState(true);
            const messagesEndRef = useRef(null);

            const PRODUCTS_PER_PAGE = 6;
            const SELLERS_PER_PAGE = 3;

            // Load sellers and products from database on mount
            useEffect(() => {
                loadSellersFromDatabase();
            }, []);

            const loadSellersFromDatabase = async () => {
                try {
                    setIsLoadingData(true);
                    
                    // Start timer for minimum 5 seconds
                    const startTime = Date.now();
                    
                    // Fetch ALL sellers (so buyers see all available sellers)
                    const { data: sellersData, error: sellersError } = await supabaseClient
                        .from('profiles')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (sellersError) throw sellersError;
                    
                    // Fetch ALL products
                    const { data: productsData, error: productsError } = await supabaseClient
                        .from('products')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (productsError) throw productsError;
                    
                    // Map sellers with their products
                    const mappedSellers = (sellersData || []).map(seller => {
                        // Check if free trial is active
                        const isTrusted = seller.is_free_trial && seller.free_trial_expires_at 
                            ? new Date(seller.free_trial_expires_at) > new Date()
                            : seller.subscription_plan === 'growth_pro';
                        
                        return {
                            id: seller.id,
                            name: seller.business_name,
                            email: seller.email,
                            category: seller.category,
                            gender: seller.gender || null,
                            location: seller.location,
                            bio: seller.bio || "Seller on SearchPadi",
                            isVerified: seller.is_verified || false,
                            isTrusted: isTrusted,
                            isFreeTrial: seller.is_free_trial || false,
                            freeTrialExpiresAt: seller.free_trial_expires_at,
                            whatsappNumber: seller.whatsapp,
                            profilePhoto: seller.profile_photo || DEFAULT_PROFILE_IMAGE,
                            views: seller.views || 0,
                            subscription: seller.subscription_plan || 'free',
                            products: (productsData || [])
                                .filter(p => p.seller_id === seller.id)
                                .map(product => ({
                                    id: product.id,
                                    name: product.name,
                                    price: product.price || 'Ask for Price',
                                    description: product.description || '',
                                    images: product.images || [DEFAULT_PRODUCT_IMAGE],
                                    keywords: product.keywords || [],
                                    likes: product.likes || 0,
                                    liked: false,
                                    isTrusted: isTrusted && product.is_trusted
                                }))
                        };
                    });
                    
                    // Calculate remaining time to reach 5 seconds
                    const elapsedTime = Date.now() - startTime;
                    const remainingTime = Math.max(5000 - elapsedTime, 0);
                    
                    // Wait for remaining time if less than 5 seconds have passed
                    if (remainingTime > 0) {
                        await new Promise(resolve => setTimeout(resolve, remainingTime));
                    }
                    
                    setSellers(mappedSellers);
                    console.log('✅ Loaded', mappedSellers.length, 'sellers with products');
                    
                } catch (error) {
                    console.error('Error loading data from database:', error);
                    
                    // Even on error, wait for minimum 5 seconds
                    const elapsedTime = Date.now() - startTime;
                    const remainingTime = Math.max(5000 - elapsedTime, 0);
                    if (remainingTime > 0) {
                        await new Promise(resolve => setTimeout(resolve, remainingTime));
                    }
                    
                    // Show empty state, not error
                    setSellers([]);
                } finally {
                    setIsLoadingData(false);
                }
            };

            // Shuffle array utility function
            const shuffleArray = (array) => {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            };

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, isTyping, showProducts, showSellers]);

            // Load initial recommended products
            useEffect(() => {
                if (currentStep === 'recommendations' && displayedProducts.length === 0 && sellers.length > 0 && !isLoadingData) {
                    // Get all products from all sellers
                    const allProductsList = [];
                    sellers.forEach(seller => {
                        seller.products.forEach(product => {
                            allProductsList.push({
                                ...product,
                                seller: seller
                            });
                        });
                    });

                    if (allProductsList.length === 0) {
                        // Sellers exist but no products yet
                        setMessages([
                            { 
                                id: 1, 
                                type: 'assistant', 
                                text: 'Hello! 👋 Welcome to SearchPadi.\n\nOur sellers are setting up their products. Check back soon! ✨', 
                                timestamp: new Date(),
                                messageId: 1
                            }
                        ]);
                        setShowProducts(false);
                        return;
                    }

                    // Shuffle and take first 4
                    const shuffled = shuffleArray(allProductsList);
                    const recommended = shuffled.slice(0, 4);
                    
                    setDisplayedProducts(recommended);
                    setShowProducts(true);
                } else if (currentStep === 'recommendations' && sellers.length === 0 && !isLoadingData) {
                    // Truly no sellers at all - marketplace is empty
                    setMessages([
                        { 
                            id: 1, 
                            type: 'assistant', 
                            text: 'Hello! 👋 Welcome to SearchPadi.\n\n🚀 Be the first! Click "Become a Seller" to start.', 
                            timestamp: new Date(),
                            messageId: 1
                        }
                    ]);
                }
            }, [currentStep, sellers, isLoadingData]);

            const addMessage = (text, type = 'assistant', buttons = null) => {
                const messageId = messages.length + 1;
                setMessages(prev => [...prev, {
                    id: messageId,
                    type,
                    text,
                    buttons,
                    messageId,
                    timestamp: new Date()
                }]);
                return messageId;
            };

            const simulateTyping = async (duration = 1200) => {
                setIsTyping(true);
                await new Promise(resolve => setTimeout(resolve, duration));
                setIsTyping(false);
            };

            const detectCategory = (query) => {
                const queryLower = query.toLowerCase();
                
                if (queryLower.match(/phone|iphone|samsung|tablet|ipad|mobile|smartphone|galaxy/)) {
                    return 'phones';
                } else if (queryLower.match(/laptop|computer|macbook|gaming|ps5|electronics/)) {
                    return 'electronics';
                } else if (queryLower.match(/shoe|sneaker|heel|boot|sandal|footwear/)) {
                    return 'shoes';
                } else if (queryLower.match(/cloth|fashion|dress|shirt|trouser|wear/)) {
                    return 'fashion';
                } else if (queryLower.match(/furniture|sofa|bed|table|chair|fridge/)) {
                    return 'furniture';
                }
                
                return null;
            };

            const scoreProduct = (product, searchTerms) => {
                let score = 0;
                const productText = (product.name + ' ' + product.keywords.join(' ')).toLowerCase();
                
                searchTerms.forEach(term => {
                    if (productText.includes(term)) {
                        score += 1;
                        if (product.name.toLowerCase().includes(term)) {
                            score += 2;
                        }
                    }
                });

                return score;
            };

            const getAllProducts = (category, gender = null, searchTerms = null) => {
                const allProds = [];

                sellers
                    .filter(s => {
                        if (s.category !== category) return false;
                        if (gender && s.gender && s.gender !== 'both' && s.gender !== gender) return false;
                        return true;
                    })
                    .forEach(seller => {
                        seller.products.forEach(product => {
                            const relevanceScore = searchTerms ? scoreProduct(product, searchTerms) : 0;
                            allProds.push({
                                ...product,
                                seller: seller,
                                relevanceScore
                            });
                        });
                    });

                if (searchTerms) {
                    const matchedProducts = allProds.filter(p => p.relevanceScore > 0);
                    if (matchedProducts.length > 0) {
                        return shuffleArray(matchedProducts.sort((a, b) => b.relevanceScore - a.relevanceScore));
                    }
                }
                
                return shuffleArray(allProds);
            };

            const resetToInitialState = () => {
                setMessages([]);
                setCurrentStep('category');
                setSelectedCategory(null);
                setSelectedGender(null);
                setShowProducts(false);
                setShowSellers(false);
                setDisplayedProducts([]);
                setAllProducts([]);
                setProductOffset(0);
                setSellerOffset(0);
                setShowNoMoreMessage(false);
                setSelectedSeller(null);
                setSelectedProduct(null);
                setSearchContext(null);
                setClickedButtons({});
            };

            const handleSearch = async () => {
                const query = searchQuery.trim();
                if (!query) return;

                resetToInitialState();

                setMessages([{ id: 1, type: 'user', text: query, timestamp: new Date(), messageId: 1 }]);
                setSearchQuery('');
                await simulateTyping(1000);

                const searchTerms = query.toLowerCase().split(' ').filter(term => term.length > 2);
                
                const allProductsAcrossCategories = [];
                sellers.forEach(seller => {
                    seller.products.forEach(product => {
                        const relevanceScore = scoreProduct(product, searchTerms);
                        if (relevanceScore > 0) {
                            allProductsAcrossCategories.push({
                                ...product,
                                seller: seller,
                                relevanceScore
                            });
                        }
                    });
                });

                if (allProductsAcrossCategories.length > 0) {
                    const sortedProducts = shuffleArray(
                        allProductsAcrossCategories.sort((a, b) => b.relevanceScore - a.relevanceScore)
                    );
                    
                    addMessage(`Excellent! Here are the best matches for "${query}" 🎯`, 'assistant');
                    await simulateTyping(1000);
                    
                    setAllProducts(sortedProducts);
                    setDisplayedProducts(sortedProducts.slice(0, PRODUCTS_PER_PAGE));
                    setProductOffset(PRODUCTS_PER_PAGE);
                    setShowProducts(true);
                    setCurrentStep('products');
                    setSearchContext({ query, searchTerms });
                    return;
                }

                const detectedCategory = detectCategory(query);
                
                if (detectedCategory) {
                    setSearchContext({ query, searchTerms });
                    setSelectedCategory(detectedCategory);
                    
                    if (detectedCategory === 'shoes' || detectedCategory === 'fashion') {
                        setCurrentStep('gender');
                        addMessage(`Great! I found what you're looking for 🎯\n\nAre you shopping for:`, 'assistant', [
                            { text: '👨 Male', value: 'male' },
                            { text: '👩 Female', value: 'female' },
                            { text: '👥 Both', value: 'both' }
                        ]);
                    } else {
                        showProductsForCategory(detectedCategory, null, searchTerms);
                    }
                } else {
                    addMessage(`I'd love to help you find what you're looking for! 😊\n\nCould you be more specific? For example:\n• "iPhone 13"\n• "Gaming laptop"\n• "Nike sneakers"\n\nOr choose a category to browse:`, 'assistant', [
                        { text: '📱 Phones & Tablets', value: 'phones' },
                        { text: '💻 Electronics', value: 'electronics' },
                        { text: '👟 Shoes & Footwear', value: 'shoes' },
                        { text: '👔 Clothes & Fashion', value: 'fashion' },
                        { text: '🏠 Home & Furniture', value: 'furniture' }
                    ]);
                }
            };

            const showProductsForCategory = async (category, gender = null, searchTerms = null) => {
                await simulateTyping(800);
                
                const products = getAllProducts(category, gender, searchTerms);
                const shuffledProducts = shuffleArray(products);

                if (shuffledProducts.length > 0) {
                    if (searchContext) {
                        addMessage(`Excellent! Here are the best matches for "${searchContext.query}" 🎯`, 'assistant');
                    } else {
                        addMessage(`Excellent! Here are available products 🎉`, 'assistant');
                    }
                    await simulateTyping(1000);
                    
                    setAllProducts(shuffledProducts);
                    setDisplayedProducts(shuffledProducts.slice(0, PRODUCTS_PER_PAGE));
                    setProductOffset(PRODUCTS_PER_PAGE);
                    setShowProducts(true);
                    setCurrentStep('products');
                } else {
                    if (searchContext) {
                        addMessage(`I couldn't find products matching "${searchContext.query}". Let me show you our verified sellers who might have what you need.`, 'assistant');
                    } else {
                        addMessage(`No products available yet. Let me show you our verified sellers.`, 'assistant');
                    }
                    await simulateTyping(1000);
                    setCurrentStep('sellers');
                    setShowSellers(true);
                    setSellerOffset(SELLERS_PER_PAGE);
                }
            };

            const handleCategorySelect = async (category, displayName, messageId) => {
                setClickedButtons(prev => ({ ...prev, [messageId]: true }));
                addMessage(displayName, 'user');
                await simulateTyping();

                setSelectedCategory(category);
                
                if (category === 'shoes' || category === 'fashion') {
                    setCurrentStep('gender');
                    addMessage(`Perfect choice! 😊 Are you shopping for:`, 'assistant', [
                        { text: '👨 Male', value: 'male' },
                        { text: '👩 Female', value: 'female' },
                        { text: '👥 Both', value: 'both' }
                    ]);
                } else {
                    showProductsForCategory(category);
                }
            };

            const handleGenderSelect = async (gender, displayName, messageId) => {
                setClickedButtons(prev => ({ ...prev, [messageId]: true }));
                addMessage(displayName, 'user');
                
                setSelectedGender(gender);
                const searchTerms = searchContext ? searchContext.searchTerms : null;
                showProductsForCategory(selectedCategory, gender, searchTerms);
            };

            const handleProductClick = async (product) => {
                setIsLoadingProductView(true);
                
                // Simulate brief loading for better UX
                await new Promise(resolve => setTimeout(resolve, 300));
                
                // Increment view count in database
                try {
                    const { error } = await supabaseClient
                        .from('profiles')
                        .update({ views: product.seller.views + 1 })
                        .eq('id', product.seller.id);
                    
                    if (!error) {
                        setSellers(prev => prev.map(s => 
                            s.id === product.seller.id ? { ...s, views: s.views + 1 } : s
                        ));
                    }
                } catch (error) {
                    console.error('Error incrementing views:', error);
                }
                
                setSelectedProduct({ ...product, seller: product.seller });
                setIsLoadingProductView(false);
            };

            const handleFindMoreProducts = async () => {
                await simulateTyping(500);
                
                if (productOffset >= allProducts.length) {
                    addMessage("No more products available. Let me show you our verified sellers for more options 🔍", 'assistant');
                    await simulateTyping(800);
                    setShowProducts(false);
                    setShowSellers(true);
                    setCurrentStep('sellers');
                    setSellerOffset(SELLERS_PER_PAGE);
                } else {
                    const nextProducts = allProducts.slice(productOffset, productOffset + PRODUCTS_PER_PAGE);
                    setDisplayedProducts(prev => [...prev, ...nextProducts]);
                    setProductOffset(prev => prev + PRODUCTS_PER_PAGE);
                }
            };

            const handleFindMoreSellers = async () => {
                await simulateTyping(500);
                
                const categorySellers = sellers.filter(s => {
                    if (s.category !== selectedCategory) return false;
                    if (selectedGender && s.gender && s.gender !== 'both' && s.gender !== selectedGender) return false;
                    return true;
                });
                
                if (sellerOffset >= categorySellers.length) {
                    setShowNoMoreMessage(true);
                    addMessage("These are all the verified sellers we have in this category right now. Try 'Start Afresh' to explore a different category!", 'assistant');
                } else {
                    setSellerOffset(prev => Math.min(prev + SELLERS_PER_PAGE, categorySellers.length));
                }
            };

            const handleStartAfresh = () => {
                setMessages([
                    { 
                        id: 1, 
                        type: 'assistant', 
                        text: 'Hello! 👋 Welcome to SearchPadi.\n\nYou might like these handpicked items just for you! ✨', 
                        timestamp: new Date(),
                        messageId: 1
                    }
                ]);
                setCurrentStep('recommendations');
                setSelectedCategory(null);
                setSelectedGender(null);
                setShowProducts(false);
                setShowSellers(false);
                setDisplayedProducts([]);
                setAllProducts([]);
                setProductOffset(0);
                setSellerOffset(0);
                setShowNoMoreMessage(false);
                setSelectedSeller(null);
                setSearchQuery('');
                setSearchContext(null);
                setClickedButtons({});
            };

            const handleSellerClick = (seller) => {
                setSelectedSeller(seller);
            };

            const handleWhatsAppMessage = (seller, product = null) => {

            const toggleProductLike = async (sellerId, productId) => {
                const seller = sellers.find(s => s.id === sellerId);
                const product = seller?.products.find(p => p.id === productId);
                
                if (!product) return;
                
                const newLikedState = !product.liked;
                const newLikesCount = newLikedState ? product.likes + 1 : product.likes - 1;
                
                try {
                    // Update in database
                    const { error } = await supabaseClient
                        .from('products')
                        .update({ likes: newLikesCount })
                        .eq('id', productId);
                    
                    if (error) throw error;
                    
                    // Update local state
                    setSellers(prev => prev.map(seller => {
                        if (seller.id === sellerId) {
                            return {
                                ...seller,
                                products: seller.products.map(product => {
                                    if (product.id === productId) {
                                        return {
                                            ...product,
                                            liked: newLikedState,
                                            likes: newLikesCount
                                        };
                                    }
                                    return product;
                                })
                            };
                        }
                        return seller;
                    }));
                    
                    setDisplayedProducts(prev => prev.map(p => {
                        if (p.seller.id === sellerId && p.id === productId) {
                            return {
                                ...p,
                                liked: newLikedState,
                                likes: newLikesCount
                            };
                        }
                        return p;
                    }));

                    setSelectedProduct(prev => {
                        if (prev && prev.id === productId && prev.seller.id === sellerId) {
                            return {
                                ...prev,
                                liked: newLikedState,
                                likes: newLikesCount
                            };
                        }
                        return prev;
                    });
                } catch (error) {
                    console.error('Error updating likes:', error);
                }
            };

            const openSellerProfile = (seller) => {

            const handleRegistration = async (formData) => {
                console.log('🚀 Starting registration...', formData);
                setIsRegistering(true);
                try {
                    const formattedPhone = formatPhoneNumber(formData.whatsappNumber);
                    console.log('📱 Formatted phone:', formattedPhone);
                    console.log('📧 Email:', formData.email);
                    
                    console.log('🔐 Creating Supabase auth account...');
                    const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                        email: formData.email,
                        password: formData.password,
                        options: {
                            data: {
                                phone: formattedPhone,
                                business_name: formData.businessName
                            }
                        }
                    });
                    
                    console.log('✅ Auth response:', authData, authError);
                    if (authError) throw authError;
                    
                    if (!authData.user) {
                        throw new Error('User creation failed - no user returned');
                    }
                    
                    console.log('💾 Saving to profiles table...');
                    
                    // Check if this is one of the first 5 sellers
                    const { count: sellerCount } = await supabaseClient
                        .from('profiles')
                        .select('*', { count: 'exact', head: true });
                    
                    const isEligibleForFreeTrial = sellerCount < 5;
                    const freeTrialExpiresAt = isEligibleForFreeTrial 
                        ? new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString() // 30 days from now
                        : null;
                    
                    console.log(`🎁 Free trial eligible: ${isEligibleForFreeTrial}, Seller count: ${sellerCount}`);
                    
                    const profileData = {
                        id: authData.user.id,
                        business_name: formData.businessName,
                        email: formData.email,
                        category: formData.category,
                        gender: formData.gender || null,
                        location: formData.location,
                        phone: formattedPhone,
                        whatsapp: formattedPhone,
                        bio: formData.bio || "New seller on SearchPadi",
                        profile_photo: formData.profilePhoto || DEFAULT_PROFILE_IMAGE,
                        subscription_plan: 'free',
                        is_verified: isEligibleForFreeTrial,
                        is_free_trial: isEligibleForFreeTrial,
                        free_trial_expires_at: freeTrialExpiresAt,
                        views: 0,
                        created_at: new Date().toISOString()
                    };
                    
                    console.log('📋 Profile data:', profileData);
                    
                    const { data: insertData, error: profileError } = await supabaseClient
                        .from('profiles')
                        .insert([profileData])
                        .select();
                    
                    console.log('✅ Profile insert response:', insertData, profileError);
                    
                    if (profileError) {
                        console.error('Profile error details:', profileError);
                        throw new Error(`Database error: ${profileError.message}`);
                    }
                    
                    const newSeller = {
                        id: authData.user.id,
                        name: formData.businessName,
                        email: formData.email,
                        category: formData.category,
                        gender: formData.gender || null,
                        location: formData.location,
                        bio: formData.bio || "New seller on SearchPadi",
                        isVerified: isEligibleForFreeTrial,
                        isTrusted: isEligibleForFreeTrial,
                        isFreeTrial: isEligibleForFreeTrial,
                        freeTrialExpiresAt: freeTrialExpiresAt,
                        whatsappNumber: formattedPhone,
                        profilePhoto: formData.profilePhoto || DEFAULT_PROFILE_IMAGE,
                        views: 0,
                        products: [],
                        subscription: 'free'
                    };
                    
                    setSellers(prev => [...prev, newSeller]);
                    setCurrentUser({ type: 'seller', data: newSeller });
                    setShowRegistration(false);
                    console.log('🎉 Registration complete!');
                    
                    if (isEligibleForFreeTrial) {
                        alert('🎉 Congratulations! You\'re one of our first 5 sellers!\n\nYou\'ve received:\n✅ Verified Profile Badge\n✅ Product Trusted Badge\n\nValid for 30 days - FREE!');
                    } else {
                        alert('✅ Account created successfully! Welcome to SearchPadi!');
                    }
                } catch (error) {
                    console.error('❌ Registration error:', error);
                    let errorMessage = '';
                    
                    if (error.message.includes('already registered') || error.message.includes('User already registered')) {
                        errorMessage = 'This email is already registered. Please login instead.';
                    } else if (error.message.includes('duplicate key') || error.message.includes('unique constraint')) {
                        errorMessage = 'This email or phone number is already in use.';
                    } else {
                        errorMessage = error.message || 'Registration failed. Please try again.';
                    }
                    
                    alert('❌ ' + errorMessage);
                    throw error;
                } finally {
                    setIsRegistering(false);
                }
            };

            const handleAddProduct = async (productData) => {
                setIsUploadingProduct(true);
                try {

                    const { data: sellerProfile } = await supabaseClient
                        .from('profiles')
                        .select('is_free_trial, free_trial_expires_at, subscription_plan')
                        .eq('id', currentUser.data.id)

                    if (sellerProfile) {

                        isTrusted: insertedProduct.is_trusted

                setTouchEnd(0);

                if (!touchStart || !touchEnd) return;
                
                const distance = touchStart - touchEnd;
                const isLeftSwipe = distance > minSwipeDistance;
                const isRightSwipe = distance < -minSwipeDistance;

                if (isLeftSwipe && currentIndex < product.images.length - 1) {
                    setCurrentIndex(currentIndex + 1);

                    setCurrentIndex(currentIndex - 1);

        // Registration Modal
        function RegistrationModal({ onClose, onRegister, onSwitchToLogin }) {
            const [formData, setFormData] = useState({
                profilePhoto: '',
                businessName: '',
                email: '',
                category: 'phones',
                gender: '',
                location: '',
                whatsappNumber: '',
                password: '',
                bio: ''
            });
            const [previewPhoto, setPreviewPhoto] = useState(DEFAULT_PROFILE_IMAGE);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const fileInputRef = useRef(null);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                
                if (!formData.businessName || !formData.email || !formData.location || !formData.whatsappNumber || !formData.password) {
                    setError('Please fill in all required fields');
                    return;
                }
                
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(formData.email)) {
                    setError('Please enter a valid email address');
                    return;
                }
                
                if (formData.password.length < 6) {
                    setError('Password must be at least 6 characters long');
                    return;
                }
                
                setIsLoading(true);
                try {
                    await onRegister({ ...formData, profilePhoto: previewPhoto });
                } catch (err) {
                    setError('Registration failed. Please try again.');
                } finally {
                    setIsLoading(false);
                }
            };

            const compressImage = (file, maxWidth = 800, quality = 0.7) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            
                            // Resize if larger than maxWidth
                            if (width > maxWidth) {
                                height = (height * maxWidth) / width;
                                width = maxWidth;
                            }
                            
                            canvas.width = width;
                            canvas.height = height;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            // Convert to base64 with compression
                            const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                            resolve(compressedBase64);
                        };
                        img.onerror = reject;
                        img.src = e.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            };

                e.preventDefault();
                setError('');
                
                if (!formData.email || !formData.password) {
                    setError('Please fill in all fields');
                    return;
                }
                
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(formData.email)) {
                    setError('Please enter a valid email address');
                    return;
                }
                
                setIsLoading(true);
                
                try {
                    const { data, error: authError } = await supabaseClient.auth.signInWithPassword({
                        email: formData.email,
                        password: formData.password
                    });
                    
                    if (authError) throw authError;
                    
                    const { data: profile, error: profileError } = await supabaseClient
                        .from('profiles')
                        .select('*')
                        .eq('id', data.user.id)
                        .single();
                    
                    if (profileError) {
                        console.error('Profile fetch error:', profileError);
                        throw new Error('Could not load profile. Please contact support.');
                    }
                    
                    // Fetch user's products
                    const { data: products, error: productsError } = await supabaseClient
                        .from('products')
                        .select('*')
                        .eq('seller_id', profile.id);
                    
                    const sellerData = {
                        id: profile.id,
                        name: profile.business_name,
                        email: profile.email,
                        category: profile.category,
                        gender: profile.gender || null,
                        location: profile.location,

                        whatsappNumber: profile.whatsapp,

                            liked: false,
                            isTrusted: p.is_trusted || false
                        })),
                        subscription: profile.subscription_plan || 'free'
                    };
                    
                    onLoginSuccess(sellerData);
                    alert('✅ Login successful! Welcome back!');

                    price: '₦9,900',
                    period: '/mo',
                    features: [
                        { text: 'Verified Profile Badge', included: true, highlight: true },
                        { text: 'Product Trusted Badge', included: true, highlight: true },
                        { text: 'Enhanced Product Visibility', included: true },
                        { text: 'Priority Customer Support', included: true }
                    ],
                    borderColor: 'border-orange-400',
                    buttonText: 'Go Pro',
                    buttonColor: 'bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white',
                    textColor: 'text-orange-600',
                    recommended: true,
                    badge: 'RECOMMENDED'
                }
            ];

            const handleUpgrade = (plan) => {
                if (plan.buttonText === 'Current Plan') {
                    return;
                } else {
                    alert(`Upgrade to ${plan.name} for ${plan.price}${plan.period}\n\nPayment integration coming soon! Contact admin on WhatsApp: ${WHATSAPP_NUMBER} to upgrade.`);
                }
            };

            return (
                <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4" onClick={onClose}>
                    <div className="bg-gradient-to-br from-gray-50 to-white rounded-3xl max-w-6xl w-full max-h-[90vh] overflow-y-auto shadow-2xl" onClick={(e) => e.stopPropagation()}>
                        <div className="sticky top-0 bg-white/95 backdrop-blur-sm border-b border-gray-200 p-6 z-10 rounded-t-3xl">
                            <div className="flex justify-between items-start">
                                <div className="text-center flex-1">
                                    <h2 className="text-2xl md:text-3xl font-bold text-[#0f2942] leading-snug">
                                        Choose a Growth Plan, Attract More Buyers
                                    </h2>
                                </div>
                                <button 
                                    onClick={onClose} 
                                    className="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-gray-700 hover:bg-gray-300 transition-colors ml-4 flex-shrink-0"
                                >
                                    ✕
                                </button>
                            </div>
                        </div>

                        <div className="p-6 md:p-10">
                            <div className="grid md:grid-cols-3 gap-6 md:gap-8">
                                {plans.map((plan, idx) => (
                                    <div 
                                        key={idx}
                                        className={`bg-white rounded-2xl p-7 border-[3px] ${plan.borderColor} relative hover:shadow-2xl transition-all duration-300 ${plan.popular ? 'transform md:scale-105' : ''}`}
                                    >
                                        {(plan.popular || plan.recommended) && (
                                            <div className={`absolute -top-3 -right-3 ${plan.popular ? 'bg-gradient-to-br from-blue-500 to-blue-600' : 'bg-gradient-to-br from-orange-500 to-orange-600'} text-white text-xs font-bold px-5 py-2 rounded-full shadow-lg`}>
                                                {plan.badge}
                                            </div>
                                        )}
                                        
                                        <div className="mb-6 text-center pb-6 border-b-2 border-gray-100">
                                            <h3 className={`text-2xl font-bold ${plan.textColor} mb-4`}>{plan.name}</h3>
                                            <div className="flex items-baseline justify-center gap-1">
                                                <span className={`text-5xl md:text-6xl font-extrabold ${plan.price === 'Free' ? 'text-gray-500' : plan.textColor}`}>
                                                    {plan.price}
                                                </span>
                                                {plan.period && <span className="text-gray-500 text-2xl font-medium">{plan.period}</span>}
                                            </div>
                                        </div>

                                        <ul className="space-y-4 mb-8">
                                            {plan.features.map((feature, fIdx) => (
                                                <li 
                                                    key={fIdx} 
                                                    className={`flex items-start gap-3 ${
                                                        feature.highlight 
                                                            ? 'text-orange-600 font-bold text-base' 
                                                            : feature.included 
                                                                ? 'text-gray-700' 
                                                                : 'text-gray-400'
                                                    }`}
                                                >
                                                    {feature.included ? (
                                                        <svg className={`w-6 h-6 flex-shrink-0 mt-0.5 ${feature.highlight ? 'text-orange-500' : plan.textColor}`} fill="currentColor" viewBox="0 0 20 20">
                                                            <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"/>
                                                        </svg>
                                                    ) : (
                                                        <svg className="w-6 h-6 text-gray-300 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                                                            <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd"/>
                                                        </svg>
                                                    )}
                                                    <span className="text-sm leading-relaxed">{feature.text}</span>
                                                </li>
                                            ))}
                                        </ul>

                                        <button
                                            onClick={() => handleUpgrade(plan)}
                                            className={`w-full py-4 rounded-xl font-bold transition-all shadow-lg text-lg ${plan.buttonColor}`}
                                        >
                                            {plan.buttonText}
                                        </button>
                                    </div>
                                ))}
                            </div>

                            <div className="mt-10 text-center space-y-3">
                                <p className="text-gray-500 text-base">
                                    Cancel or upgrade anytime. Billed monthly.
                                </p>
                                <p className="text-gray-400 text-sm">
                                    💳 Secure payments • 24/7 Support • Money-back guarantee
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
        
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('✅ Service Worker registered:', registration);
                    })
                    .catch(error => {
                        console.log('❌ Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
