<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SearchPadi Admin</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;
    const { createClient } = supabase;

    const SUPABASE_URL = 'https://fxjnbqymkdvuqfeagpur.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4am5icXlta2R2dXFmZWFncHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMTE0NTUsImV4cCI6MjA4NjU4NzQ1NX0.qcQPStoxVPdJfAEDJ-f0xiu_EQkRnZd2c2uDIhMMAdg';
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const DEFAULT_PROFILE_IMAGE = "https://via.placeholder.com/400x400/6366f1/ffffff?text=Profile";

    function AdminLoginModal({ onLogin }) {
        const [password, setPassword] = useState('');
        const [error, setError] = useState('');

        const handleSubmit = (e) => {
            e.preventDefault();
            if (password === '@654321') { onLogin(); }
            else { setError('Incorrect password'); }
        };

        return (
            <div className="min-h-screen bg-[#0a0a0a] flex items-center justify-center p-4">
                <div className="bg-[#1a1a1a] border border-gray-800 rounded-2xl max-w-md w-full p-8">
                    <h2 className="text-2xl font-bold text-white mb-2 text-center">SearchPadi</h2>
                    <p className="text-gray-500 text-sm text-center mb-6">Admin Dashboard</p>
                    {error && <div className="bg-red-500/10 border border-red-500 text-red-500 px-4 py-3 rounded-lg mb-4 text-center">{error}</div>}
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div>
                            <label className="block text-sm font-medium text-gray-300 mb-2">Password</label>
                            <input type="password" value={password} onChange={(e) => setPassword(e.target.value)}
                                className="w-full px-4 py-3 bg-[#2a2a2a] border border-gray-700 text-white rounded-lg focus:outline-none focus:border-purple-500"
                                placeholder="Enter admin password" autoFocus />
                        </div>
                        <button type="submit" className="w-full bg-purple-600 text-white py-3 rounded-lg font-bold hover:bg-purple-700 transition-colors">
                            Access Dashboard
                        </button>
                    </form>
                </div>
            </div>
        );
    }

    function AdminDashboard() {
        const [stats, setStats] = useState({ total_profit: 0, total_ad_budget: 0, phones_ad_budget: 0, electronics_ad_budget: 0, shoes_ad_budget: 0, fashion_ad_budget: 0, furniture_ad_budget: 0, foods_ad_budget: 0, beauty_ad_budget: 0, general_ad_budget: 0 });
        const [analytics, setAnalytics] = useState({ visits_today: 0, visits_week: 0, visits_month: 0, period_start: null, phones_searches: 0, electronics_searches: 0, shoes_searches: 0, fashion_searches: 0, furniture_searches: 0, foods_searches: 0, beauty_searches: 0, general_searches: 0 });
        const [pendingPayments, setPendingPayments] = useState([]);
        const [pendingAccounts, setPendingAccounts] = useState([]);
        const [totalSellers, setTotalSellers] = useState(0);
        const [searchQuery, setSearchQuery] = useState('');
        const [searchResults, setSearchResults] = useState([]);
        const [showAdBudgetBreakdown, setShowAdBudgetBreakdown] = useState(false);
        const [runningCampaigns, setRunningCampaigns] = useState([]);
        const [completedCampaigns, setCompletedCampaigns] = useState([]);
        const [showSellersByCategory, setShowSellersByCategory] = useState(false);
        const [sellersByCategory, setSellersByCategory] = useState({});
        const [activeTab, setActiveTab] = useState('accounts');
        const [balanceView, setBalanceView] = useState('total');

        const formatCount = (n) => {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toString();
        };

        useEffect(() => { loadAdminData(); }, []);

        const loadAdminData = async () => {
            try {
                const { data: statsData } = await supabaseClient.from('admin_stats').select('*').eq('id', 1).single();
                if (statsData) setStats(statsData);

                const { data: analyticsData } = await supabaseClient.from('site_analytics').select('*').eq('id', 1).single();
                if (analyticsData) setAnalytics(analyticsData);

                const { data: paymentsData } = await supabaseClient.from('pending_payments').select('*').eq('status', 'pending').order('created_at', { ascending: false });
                if (paymentsData) setPendingPayments(paymentsData);

                const { data: runningData } = await supabaseClient.from('pending_payments').select('*').eq('status', 'approved').order('approved_at', { ascending: false });
                if (runningData) {
                    const enriched = await Promise.all(runningData.map(async (c) => {
                        if (!c.seller_whatsapp && c.seller_id) {
                            const { data: profile } = await supabaseClient.from('profiles').select('whatsapp').eq('id', c.seller_id).single();
                            return { ...c, seller_whatsapp: profile?.whatsapp || '' };
                        }
                        return c;
                    }));
                    const now = new Date();
                    const running = [], completed = [];
                    enriched.forEach(c => {
                        const approvedAt = new Date(c.approved_at || c.updated_at);
                        const days = c.plan_type === 'verified_pro' ? 2 : 1;
                        const expiresAt = new Date(approvedAt.getTime() + days * 24 * 60 * 60 * 1000);
                        if (now < expiresAt) running.push({ ...c, expiresAt });
                        else completed.push({ ...c, expiresAt });
                    });
                    setRunningCampaigns(running);
                    setCompletedCampaigns(completed);
                }

                const { data: accountsData } = await supabaseClient.from('profiles').select('*').eq('account_status', 'pending').order('created_at', { ascending: false });
                if (accountsData) setPendingAccounts(accountsData);

                const { count } = await supabaseClient.from('profiles').select('*', { count: 'exact', head: true }).eq('account_status', 'approved');
                setTotalSellers(count || 0);

                const { data: categoryData } = await supabaseClient.from('profiles').select('category').eq('account_status', 'approved');
                if (categoryData) {
                    const grouped = categoryData.reduce((acc, s) => { const cat = s.category || 'unknown'; acc[cat] = (acc[cat] || 0) + 1; return acc; }, {});
                    setSellersByCategory(grouped);
                }
            } catch (err) { console.error(err); }
        };

        const handleApprove = async (payment) => {
            try {
                if (payment.plan_type === 'free_campaign') {
                    const { error } = await supabaseClient.from('pending_payments').update({ status: 'approved', approved_at: new Date().toISOString() }).eq('id', payment.id);
                    if (error) { alert('Failed: ' + error.message); return; }
                    loadAdminData();
                    alert('Free campaign approved for ' + payment.seller_name);
                    return;
                }
                const giveVerified = payment.plan_type === 'verified_pro';
                const updateData = { subscription_plan: payment.plan_type };
                if (giveVerified) { updateData.is_verified = true; updateData.temp_verified_until = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString(); }
                const { error: e1 } = await supabaseClient.from('profiles').update(updateData).eq('id', payment.seller_id);
                if (e1) { alert('Profile update failed: ' + e1.message); return; }
                const adBudget = Math.round(payment.amount / 2);
                const profit = Math.round(payment.amount / 2);
                const catField = `${payment.category}_ad_budget`;
                await supabaseClient.from('admin_stats').update({ total_profit: stats.total_profit + profit, total_ad_budget: stats.total_ad_budget + adBudget, [catField]: (stats[catField] || 0) + adBudget, updated_at: new Date().toISOString() }).eq('id', 1);
                await supabaseClient.from('pending_payments').update({ status: 'approved', approved_at: new Date().toISOString(), payment_screenshot: null }).eq('id', payment.id);
                loadAdminData();
                alert('Payment approved!');
            } catch (err) { alert('Error: ' + err.message); }
        };

        const handleDecline = async (payment) => {
            if (!confirm('Decline this payment?')) return;
            await supabaseClient.from('pending_payments').update({ status: 'declined', payment_screenshot: null }).eq('id', payment.id);
            loadAdminData();
        };

        const handleApproveAccount = async (account) => {
            const { error } = await supabaseClient.from('profiles').update({ 
                account_status: 'approved', 
                is_verified: true,
                verification_video: null, 
                verified_at: new Date().toISOString() 
            }).eq('id', account.id);
            if (error) { alert('Failed'); return; }
            // Also mark all their products as trusted
            await supabaseClient.from('products').update({ is_trusted: true }).eq('seller_id', account.id);
            loadAdminData();
            // Open WhatsApp to notify seller
            const wa = (account.whatsapp || account.phone || '').replace(/\D/g, '');
            const msg = encodeURIComponent(`Hi ${account.business_name}! 🎉 Your SearchPadi account has been verified.\n\nWith just ₦2,400 you can start getting customers instantly — head to https://searchpadi-phi.vercel.app and tap *Get Customers* to run your first campaign.`);
            if (wa) window.open(`https://wa.me/${wa}?text=${msg}`, '_blank');
            alert(account.business_name + ' verified!');
        };

        const handleDeclineAccount = async (account) => {
            if (!confirm('Decline ' + account.business_name + '?')) return;
            await supabaseClient.from('profiles').update({ account_status: 'declined' }).eq('id', account.id);
            loadAdminData();
        };

        const handleSearch = async (query) => {
            if (!query.trim()) { setSearchResults([]); return; }
            const { data } = await supabaseClient.from('profiles').select('*').or(`business_name.ilike.%${query}%,email.ilike.%${query}%`).limit(10);
            if (data) setSearchResults(data);
        };

        const WAIcon = () => (
            <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
        );

        const categoryRows = [['phones','Phones & Gadgets'],['electronics','Electronics'],['shoes','Shoes & Footwear'],['fashion','Clothes & Fashion'],['furniture','Home & Furniture'],['foods','Foods & Edibles'],['beauty','Beauty & Personal Care'],['general','General Store']];
        const searchKeys = ['phones_searches','electronics_searches','shoes_searches','fashion_searches','furniture_searches','foods_searches','beauty_searches','general_searches'];
        const searchLabels = ['📱 Phones & Gadgets','💻 Electronics','👟 Shoes & Footwear','👔 Clothes & Fashion','🏠 Home & Furniture','🍕 Foods & Edibles','💄 Beauty & Personal Care','🛒 General Store'];
        const totalSearches = searchKeys.reduce((s, k) => s + (analytics[k] || 0), 0);

        return (
            <div className="min-h-screen bg-[#0a0a0a]">
                <div className="max-w-3xl mx-auto p-4 md:p-8">

                    {/* Header */}
                    <div className="flex justify-between items-center mb-8 gap-4">
                        <h1 className="text-2xl font-bold text-white">Admin Dashboard</h1>
                        <div className="relative">
                            <input type="text" value={searchQuery}
                                onChange={(e) => { setSearchQuery(e.target.value); handleSearch(e.target.value); }}
                                placeholder="Search sellers..."
                                className="bg-[#1a1a1a] border border-gray-800 text-white px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm w-56" />
                            {searchResults.length > 0 && (
                                <div className="absolute top-full mt-2 w-full bg-[#1a1a1a] border border-gray-800 rounded-lg shadow-2xl max-h-80 overflow-y-auto z-10">
                                    {searchResults.map(seller => (
                                        <div key={seller.id} className="p-3 hover:bg-[#2a2a2a] cursor-pointer border-b border-gray-800/50 last:border-b-0 flex items-center gap-3"
                                            onClick={() => { setSearchQuery(''); setSearchResults([]); }}>
                                            <img src={seller.profile_photo || DEFAULT_PROFILE_IMAGE} className="w-10 h-10 rounded-full object-cover" />
                                            <div>
                                                <p className="text-white font-medium text-sm">{seller.business_name}</p>
                                                <p className="text-gray-400 text-xs">{seller.email}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Visits */}
                    <div className="grid grid-cols-3 gap-3 mb-4">
                        {[['Today', analytics.visits_today], ['This Week', analytics.visits_week], ['This Month', analytics.visits_month]].map(([label, val]) => (
                            <div key={label} className="bg-[#1a1a1a] border border-gray-800 rounded-xl p-4 text-center">
                                <div className="text-gray-400 text-xs mb-1">{label}</div>
                                <div className="text-2xl font-bold text-white">{formatCount(val || 0)}</div>
                                <div className="text-gray-500 text-xs">visits</div>
                            </div>
                        ))}
                    </div>
                    {analytics.period_start && <p className="text-gray-600 text-xs mb-4">📅 Period started: {new Date(analytics.period_start).toLocaleDateString('en-NG', { day: 'numeric', month: 'short', year: 'numeric' })} · Resets every 30 days</p>}

                    {/* Stats Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div className="bg-[#1a1a1a] border border-gray-800 rounded-xl p-6 cursor-pointer hover:border-blue-500 transition-colors" onClick={() => setShowSellersByCategory(true)}>
                            <div className="flex items-center justify-between mb-2">
                                <div className="text-gray-400 text-sm">Total Sellers</div>
                                <svg className="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
                            </div>
                            <div className="text-3xl font-bold text-white">{totalSellers}</div>
                            <div className="text-gray-600 text-xs mt-1">Tap to see by category</div>
                        </div>
                        <div className="bg-[#1a1a1a] border border-gray-800 rounded-xl p-6">
                            <div className="flex items-center justify-between mb-2">
                                <div className="text-gray-400 text-sm">Profit</div>
                                <select value={balanceView} onChange={e => setBalanceView(e.target.value)} className="bg-[#2a2a2a] border border-gray-700 text-gray-300 text-xs rounded px-2 py-1 focus:outline-none">
                                    <option value="total">All Time</option>
                                    <option value="period">This Period</option>
                                </select>
                            </div>
                            <div className="text-3xl font-bold text-green-500">₦{((balanceView === 'total' ? stats.total_profit : (stats.period_profit || 0)) / 100).toLocaleString('en-NG', { minimumFractionDigits: 2 })}</div>
                        </div>
                        <div className="bg-[#1a1a1a] border border-gray-800 rounded-xl p-6 cursor-pointer hover:border-purple-500 transition-colors" onClick={() => setShowAdBudgetBreakdown(true)}>
                            <div className="text-gray-400 text-sm mb-2">Ad Budget</div>
                            <div className="text-3xl font-bold text-purple-500">₦{((balanceView === 'total' ? stats.total_ad_budget : (stats.period_ad_budget || 0)) / 100).toLocaleString('en-NG', { minimumFractionDigits: 2 })}</div>
                            <div className="text-xs text-gray-500 mt-2">Tap for breakdown</div>
                        </div>
                    </div>

                    {/* Category Searches */}
                    <div className="bg-[#1a1a1a] border border-gray-800 rounded-xl p-5 mb-6">
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-white font-bold">Category Searches</h3>
                            <span className="text-gray-500 text-xs">Resets with period</span>
                        </div>
                        <div className="space-y-3">
                            {searchKeys.map((key, i) => {
                                const val = analytics[key] || 0;
                                const pct = totalSearches > 0 ? Math.round((val / totalSearches) * 100) : 0;
                                return (
                                    <div key={key}>
                                        <div className="flex items-center justify-between mb-1">
                                            <span className="text-gray-300 text-sm">{searchLabels[i]}</span>
                                            <span className="text-white font-bold text-sm">{formatCount(val)}</span>
                                        </div>
                                        <div className="w-full bg-[#2a2a2a] rounded-full h-1.5">
                                            <div className="bg-purple-600 h-1.5 rounded-full" style={{ width: pct + '%' }}></div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="flex gap-2 mb-4 flex-wrap">
                        {[
                            { key: 'accounts', label: 'Pending Accounts', count: pendingAccounts.length },
                            { key: 'payments', label: 'Pending Campaigns', count: pendingPayments.length },
                            { key: 'running', label: 'Running', count: runningCampaigns.length },
                            { key: 'completed', label: 'Completed', count: 0 },
                        ].map(({ key, label, count }) => (
                            <button key={key} onClick={() => setActiveTab(key)}
                                className={`px-4 py-2 rounded-lg font-semibold text-sm transition-colors ${activeTab === key ? 'bg-purple-600 text-white' : 'bg-[#1a1a1a] text-gray-400 border border-gray-800 hover:border-purple-500'}`}>
                                {label}{count > 0 && <span className="ml-1.5 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full">{count}</span>}
                            </button>
                        ))}
                    </div>

                    {/* Pending Accounts */}
                    {activeTab === 'accounts' && (
                        <div className="bg-[#1a1a1a] border border-gray-800 rounded-xl p-6">
                            <h2 className="text-xl font-bold text-white mb-4">Pending Accounts</h2>
                            {pendingAccounts.length === 0 ? <div className="text-center py-12 text-gray-500">No pending accounts</div> : (
                                <div className="space-y-4">
                                    {pendingAccounts.map(account => (
                                        <div key={account.id} className="bg-[#2a2a2a] rounded-xl p-5 border border-gray-700">
                                            <div className="flex items-start gap-4 mb-4">
                                                <img src={account.profile_photo || DEFAULT_PROFILE_IMAGE} className="w-14 h-14 rounded-full object-cover border-2 border-gray-600" />
                                                <div className="flex-1">
                                                    <h3 className="text-white font-bold text-lg">{account.business_name}</h3>
                                                    <p className="text-gray-400 text-sm">{account.email}</p>
                                                    <p className="text-gray-400 text-sm">{account.location} · {account.category}</p>
                                                    <p className="text-gray-500 text-xs mt-1">{new Date(account.created_at).toLocaleString()}</p>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3 mb-4">
                                                <div>
                                                    <p className="text-gray-400 text-xs mb-2 font-medium">SELFIE PHOTO</p>
                                                    {account.selfie_photo ? <img src={account.selfie_photo} className="w-full h-32 object-cover rounded-lg border border-gray-700" /> : <div className="w-full h-32 bg-[#1a1a1a] rounded-lg border border-gray-700 flex items-center justify-center text-gray-600 text-sm">Not provided</div>}
                                                </div>
                                                <div>
                                                    <p className="text-gray-400 text-xs mb-2 font-medium">ID PHOTO (HOLDING ID)</p>
                                                    {account.selfie_photo ? <img src={account.selfie_photo} className="w-full h-32 object-cover rounded-lg border border-gray-700" /> : <div className="w-full h-32 bg-[#1a1a1a] rounded-lg border border-gray-700 flex items-center justify-center text-gray-600 text-sm">Not provided</div>}
                                                </div>
                                            </div>
                                            <p className="text-yellow-600 text-xs mb-4">⚠️ Approving will delete their video and keep only the selfie.</p>
                                            <div className="flex gap-3">
                                                <button onClick={() => handleApproveAccount(account)} className="flex-1 bg-green-600 hover:bg-green-700 text-white py-2.5 rounded-lg font-semibold text-sm">✓ Approve</button>
                                                <button onClick={() => handleDeclineAccount(account)} className="flex-1 bg-red-600/20 text-red-400 py-2.5 rounded-lg font-semibold text-sm border border-red-800">✗ Decline</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Pending Payments */}
                    {activeTab === 'payments' && (
                        <div className="bg-[#1a1a1a] border border-gray-800 rounded-xl p-6">
                            <h2 className="text-xl font-bold text-white mb-4">Pending Campaigns</h2>
                            {pendingPayments.length === 0 ? <div className="text-center py-12 text-gray-500">No pending payments</div> : (
                                <div className="space-y-4">
                                    {pendingPayments.map(payment => (
                                        <div key={payment.id} className="bg-[#2a2a2a] rounded-xl p-5 border border-gray-700">
                                            <div className="flex items-start gap-4">
                                                <div className="flex-shrink-0">
                                                    {payment.payment_screenshot
                                                        ? <img src={payment.payment_screenshot} className="w-28 h-28 object-cover rounded-lg border-2 border-purple-500 cursor-pointer" onClick={() => window.open(payment.payment_screenshot, '_blank')} />
                                                        : <div className="w-28 h-28 bg-[#1a1a1a] rounded-lg border border-gray-700 flex items-center justify-center text-gray-600 text-xs">No screenshot</div>}
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <h3 className="text-white font-bold text-base mb-1">
                                                        {payment.seller_name}
                                                        {payment.plan_type === 'free_campaign' && <span className="ml-2 bg-green-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">🎁 FREE</span>}
                                                    </h3>
                                                    <p className="text-gray-400 text-sm mb-1">Plan: <span className="text-white capitalize">{payment.plan_type.replace(/_/g, ' ')}</span></p>
                                                    {payment.product_name && (
                                                        <div className="flex items-center gap-2 mb-1">
                                                            {payment.product_image && <img src={payment.product_image} className="w-9 h-9 rounded object-cover"/>}
                                                            <p className="text-white text-sm font-semibold">{payment.product_name}</p>
                                                        </div>
                                                    )}
                                                    {payment.plan_type !== 'free_campaign' && <p className="text-gray-400 text-sm">Amount: <span className="text-white font-bold">₦{(payment.amount / 100).toLocaleString()}</span></p>}
                                                    <p className="text-gray-500 text-xs mt-1">{new Date(payment.payment_timestamp).toLocaleString()}</p>
                                                    <div className="flex gap-2 mt-2 flex-wrap">
                                                        {payment.product_id && (
                                                            <a href={`https://searchpadi-phi.vercel.app/product.html?id=${payment.product_id}`} target="_blank" className="inline-flex items-center gap-1 bg-purple-900/50 hover:bg-purple-900 text-purple-300 text-xs font-semibold px-3 py-1.5 rounded-lg border border-purple-800">🔗 View Product</a>
                                                        )}
                                                        {payment.seller_id && (
                                                            <a href={`https://searchpadi-phi.vercel.app/seller.html?id=${payment.seller_id}`} target="_blank" className="inline-flex items-center gap-1 bg-blue-900/50 hover:bg-blue-900 text-blue-300 text-xs font-semibold px-3 py-1.5 rounded-lg border border-blue-800">👤 View Seller</a>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="flex flex-col gap-2 flex-shrink-0">
                                                    <button onClick={() => handleApprove(payment)} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">✓ Approve</button>
                                                    <a href={`https://wa.me/${(payment.seller_whatsapp||'').replace(/\D/g,'')}?text=${encodeURIComponent(payment.plan_type === 'free_campaign' ? `Hi ${(payment.seller_name||'').split(' ')[0]}! 🎉 Your *${payment.product_name}* promotion on SearchPadi has been approved.\n\nPlease send me *4 clear images* of the product so I can set up your campaign.\n\nWe'll start reaching customers within 24 hours! 🚀` : `Hi ${(payment.seller_name||'').split(' ')[0]}! ✅ Your *${payment.product_name}* campaign payment has been confirmed.\n\nWe'll start reaching customers within 24–48 hours. Keep your WhatsApp active! 🚀`)}`}
                                                        target="_blank" className="bg-[#25D366] text-white px-4 py-2 rounded-lg text-sm font-semibold text-center">💬 WhatsApp</a>
                                                    <button onClick={() => handleDecline(payment)} className="bg-red-600/20 text-red-400 px-4 py-2 rounded-lg text-sm font-semibold border border-red-800">✗ Decline</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Running Campaigns */}
                    {activeTab === 'running' && (
                        <div className="bg-[#1a1a1a] border border-gray-800 rounded-xl p-6">
                            <h2 className="text-xl font-bold text-white mb-4">Running Campaigns</h2>
                            {runningCampaigns.length === 0 ? <div className="text-center py-12 text-gray-500">No active campaigns</div> : (
                                <div className="space-y-3">
                                    {runningCampaigns.map(campaign => {
                                        const hoursLeft = Math.max(0, Math.ceil((campaign.expiresAt - new Date()) / (1000 * 60 * 60)));
                                        const isUrgent = hoursLeft <= 3;
                                        return (
                                            <div key={campaign.id} className={`bg-[#2a2a2a] rounded-xl p-4 border ${isUrgent ? 'border-red-700' : 'border-green-800'}`}>
                                                <div className="flex items-center gap-3">
                                                    {campaign.product_image && <img src={campaign.product_image} className="w-14 h-14 rounded-lg object-cover flex-shrink-0"/>}
                                                    <div className="flex-1 min-w-0">
                                                        <p className="text-white font-bold truncate">{campaign.seller_name}</p>
                                                        <p className="text-gray-400 text-xs capitalize">{campaign.plan_type.replace('_', ' ')} — {campaign.product_name || 'No product'}</p>
                                                        <div className={`inline-flex items-center gap-1 mt-1 px-2 py-0.5 rounded-full text-xs font-semibold ${isUrgent ? 'bg-red-900/50 text-red-300' : 'bg-green-900/50 text-green-300'}`}>
                                                            <div className={`w-1.5 h-1.5 rounded-full ${isUrgent ? 'bg-red-400' : 'bg-green-400'}`}/>
                                                            {hoursLeft}h remaining
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col gap-2 flex-shrink-0">
                                                        {campaign.product_id && <a href={`https://searchpadi-phi.vercel.app/product.html?id=${campaign.product_id}`} target="_blank" className="bg-purple-900/50 text-purple-300 text-xs font-semibold px-3 py-1.5 rounded-lg border border-purple-800 text-center">🔗 Product</a>}
                                                        {campaign.seller_id && <a href={`https://searchpadi-phi.vercel.app/seller.html?id=${campaign.seller_id}`} target="_blank" className="bg-blue-900/50 text-blue-300 text-xs font-semibold px-3 py-1.5 rounded-lg border border-blue-800 text-center">👤 Seller</a>}
                                                        <a href={`https://wa.me/${(campaign.seller_whatsapp||'').replace(/\D/g,'')}`} target="_blank" className="flex-shrink-0 bg-green-600 hover:bg-green-700 text-white p-2.5 rounded-lg flex items-center justify-center"><WAIcon /></a>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Completed Campaigns */}
                    {activeTab === 'completed' && (
                        <div className="bg-[#1a1a1a] border border-gray-800 rounded-xl p-6">
                            <h2 className="text-xl font-bold text-white mb-4">Completed Campaigns</h2>
                            {completedCampaigns.length === 0 ? <div className="text-center py-12 text-gray-500">No completed campaigns yet</div> : (
                                <div className="space-y-3">
                                    {completedCampaigns.map(campaign => (
                                        <div key={campaign.id} className="bg-[#2a2a2a] rounded-xl p-4 border border-gray-700 opacity-75">
                                            <div className="flex items-center gap-3">
                                                {campaign.product_image && <img src={campaign.product_image} className="w-14 h-14 rounded-lg object-cover flex-shrink-0 grayscale"/>}
                                                <div className="flex-1 min-w-0">
                                                    <p className="text-white font-bold truncate">{campaign.seller_name}</p>
                                                    <p className="text-gray-400 text-xs capitalize">{campaign.plan_type.replace('_', ' ')} — {campaign.product_name || 'No product'}</p>
                                                    <p className="text-gray-600 text-xs mt-1">Ended {campaign.expiresAt.toLocaleDateString()}</p>
                                                </div>
                                                <a href={`https://wa.me/${(campaign.seller_whatsapp||'').replace(/\D/g,'')}`} target="_blank" className="flex-shrink-0 bg-gray-700 hover:bg-gray-600 text-white p-2.5 rounded-lg"><WAIcon /></a>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Sellers by Category Modal */}
                    {showSellersByCategory && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={() => setShowSellersByCategory(false)}>
                            <div className="bg-[#1a1a1a] border border-gray-800 rounded-2xl p-6 max-w-md w-full" onClick={(e) => e.stopPropagation()}>
                                <div className="flex items-center justify-between mb-5">
                                    <h3 className="text-xl font-bold text-white">Sellers by Category</h3>
                                    <span className="bg-blue-900/50 text-blue-300 text-sm font-bold px-3 py-1 rounded-full">{totalSellers} total</span>
                                </div>
                                <div className="space-y-3">
                                    {categoryRows.map(([key, label]) => {
                                        const count = sellersByCategory[key] || 0;
                                        const pct = totalSellers > 0 ? Math.round((count / totalSellers) * 100) : 0;
                                        return (
                                            <div key={key}>
                                                <div className="flex items-center justify-between mb-1">
                                                    <span className="text-gray-300 text-sm">{label}</span>
                                                    <span className="text-white font-bold text-sm">{count}</span>
                                                </div>
                                                <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden"><div className="h-full bg-blue-500 rounded-full" style={{ width: pct + '%' }}/></div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <button onClick={() => setShowSellersByCategory(false)} className="w-full mt-6 bg-gray-800 hover:bg-gray-700 text-white py-2.5 rounded-lg font-semibold text-sm">Close</button>
                            </div>
                        </div>
                    )}

                    {/* Ad Budget Breakdown Modal */}
                    {showAdBudgetBreakdown && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={() => setShowAdBudgetBreakdown(false)}>
                            <div className="bg-[#1a1a1a] border border-gray-800 rounded-2xl p-6 max-w-md w-full" onClick={(e) => e.stopPropagation()}>
                                <div className="flex items-center justify-between mb-5">
                                    <h3 className="text-xl font-bold text-white">Ad Budget by Category</h3>
                                    <span className="text-purple-400 font-bold">₦{(stats.total_ad_budget / 100).toLocaleString('en-NG', { minimumFractionDigits: 2 })}</span>
                                </div>
                                <div className="space-y-3">
                                    {categoryRows.map(([key, label]) => {
                                        const val = stats[key + '_ad_budget'] || 0;
                                        const pct = stats.total_ad_budget > 0 ? Math.round((val / stats.total_ad_budget) * 100) : 0;
                                        return (
                                            <div key={key}>
                                                <div className="flex items-center justify-between mb-1">
                                                    <span className="text-gray-300 text-sm">{label}</span>
                                                    <span className="text-white font-bold text-sm">₦{(val / 100).toLocaleString('en-NG', { minimumFractionDigits: 2 })}</span>
                                                </div>
                                                <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden"><div className="h-full bg-purple-500 rounded-full" style={{ width: pct + '%' }}/></div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <button onClick={() => setShowAdBudgetBreakdown(false)} className="w-full mt-5 bg-gray-800 hover:bg-gray-700 text-white py-2.5 rounded-lg font-semibold text-sm">Close</button>
                            </div>
                        </div>
                    )}

                </div>
            </div>
        );
    }

    function App() {
        const [authed, setAuthed] = useState(false);
        return authed ? <AdminDashboard /> : <AdminLoginModal onLogin={() => setAuthed(true)} />;
    }

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
