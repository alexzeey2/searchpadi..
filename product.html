<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SearchPadi - Product</title>
    <meta name="theme-color" content="#7c3aed">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { background: linear-gradient(to right, #7c3aed, #6d28d9); padding: 14px 16px; }
        .header-logo { font-size: 16px; font-weight: 800; color: white; }
        .header-sub { font-size: 11px; color: rgba(255,255,255,0.8); }
        .img-wrap { position: relative; width: 100%; height: 320px; overflow: hidden; background: #2a2a2a; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .img-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
        .img-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; transition: all 0.2s; }
        .img-dot.active { background: white; width: 16px; border-radius: 3px; }
        .img-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .img-nav.prev { left: 10px; }
        .img-nav.next { right: 10px; }
        .content { padding: 16px; }
        .product-name { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .product-price { font-size: 16px; color: #a78bfa; font-weight: 600; margin-bottom: 14px; }
        .seller-row { display: flex; align-items: center; gap: 10px; background: #2a2a2a; border-radius: 12px; padding: 10px 12px; margin-bottom: 16px; text-decoration: none; }
        .seller-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #7c3aed; flex-shrink: 0; }
        .seller-name { font-size: 14px; font-weight: 600; color: white; }
        .seller-location { font-size: 12px; color: #9ca3af; margin-top: 2px; }
        .verified-badge { display: inline-flex; align-items: center; gap: 3px; background: #065f46; color: #34d399; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 20px; margin-top: 3px; }
        .desc-box { background: #2a2a2a; border-radius: 12px; padding: 12px; margin-bottom: 16px; }
        .desc-title { font-size: 12px; font-weight: 700; color: #6b7280; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        .desc-text { font-size: 14px; color: #d1d5db; line-height: 1.6; }
        .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: #16a34a; color: white; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; text-decoration: none; }
        .btn-app { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: #7c3aed; color: white; border: none; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; }
        .skeleton { background: linear-gradient(90deg, #2a2a2a 25%, #333 50%, #2a2a2a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .error-box { text-align: center; padding: 60px 20px; }
        .error-box h2 { color: #ef4444; margin-bottom: 8px; }
        .error-box p { color: #9ca3af; font-size: 14px; margin-bottom: 20px; }
        .error-box a { color: #a78bfa; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-logo">SearchPadi</div>
        <div class="header-sub">Find Verified Sellers 🇳🇬</div>
    </div>
    <div id="app">
        <div class="skeleton" style="width:100%;height:320px;border-radius:0;"></div>
        <div class="content">
            <div class="skeleton" style="height:26px;width:70%;margin-bottom:10px;"></div>
            <div class="skeleton" style="height:18px;width:35%;margin-bottom:14px;"></div>
            <div class="skeleton" style="height:62px;margin-bottom:16px;"></div>
            <div class="skeleton" style="height:52px;margin-bottom:10px;"></div>
            <div class="skeleton" style="height:48px;"></div>
        </div>
    </div>
</div>
<script>
const SUPABASE_URL = 'https://fxjnbqymkdvuqfeagpur.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4am5icXlta2R2dXFmZWFncHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMTE0NTUsImV4cCI6MjA4NjU4NzQ1NX0.qcQPStoxVPdJfAEDJ-f0xiu_EQkRnZd2c2uDIhMMAdg';

const headers = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY };

async function get(table, params) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers });
    return res.json();
}

let images = [], currentImg = 0;

async function load() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) return showError('No product specified.');
    try {
        const [products, ] = await Promise.all([get('products', `id=eq.${encodeURIComponent(id)}&select=*`)]);
        if (!products?.length) return showError('Product not found.');
        const p = products[0];
        const sellers = await get('profiles', `id=eq.${encodeURIComponent(p.seller_id)}&select=*`);
        render(p, sellers?.[0]);
    } catch(e) {
        showError('Failed to load. Check your connection and try again.');
    }
}

function render(p, seller) {
    images = (p.images && p.images.length) ? p.images : ['https://via.placeholder.com/400x400/6366f1/ffffff?text=Product'];
    const price = p.price || 'Ask for Price';
    const wa = (seller?.whatsapp || '').replace(/\D/g, '');
    const msg = encodeURIComponent('Hi! I saw your product "' + p.name + '" on SearchPadi. I\'m interested!');
    document.title = p.name + ' - SearchPadi';
    document.getElementById('app').innerHTML = `
        <div class="img-wrap">
            <img id="mainImg" src="${images[0]}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/400x400/6366f1/fff?text=Product'" />
            ${images.length > 1 ? `
            <button class="img-nav prev" onclick="chg(-1)">&#8249;</button>
            <button class="img-nav next" onclick="chg(1)">&#8250;</button>
            <div class="img-dots">${images.map((_,i) => `<div class="img-dot${i===0?' active':''}" onclick="go(${i})"></div>`).join('')}</div>` : ''}
        </div>
        <div class="content">
            <div class="product-name">${p.name}</div>
            <div class="product-price">${price}</div>
            ${seller ? `<a class="seller-row" href="/seller.html?id=${seller.id}">
                <img class="seller-avatar" src="${seller.profile_photo||'https://via.placeholder.com/80/6366f1/fff?text=S'}" onerror="this.src='https://via.placeholder.com/80/6366f1/fff?text=S'" />
                <div>
                    <div class="seller-name">${seller.business_name}</div>
                    <div class="seller-location">📍 ${seller.location||'Nigeria'}</div>
                    ${seller.is_verified ? '<div class="verified-badge">✓ Verified Seller</div>' : ''}
                </div>
                <svg style="margin-left:auto" width="16" height="16" fill="none" stroke="#6b7280" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </a>` : ''}
            ${p.description ? `<div class="desc-box"><div class="desc-title">About Product</div><div class="desc-text">${p.description}</div></div>` : ''}
            <a class="btn-whatsapp" href="https://wa.me/${wa}?text=${msg}" target="_blank">
                <svg width="22" height="22" fill="white" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Ask for Price on WhatsApp
            </a>
            <a class="btn-app" href="/?product=${p.id}">
                <svg width="18" height="18" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                Browse More on SearchPadi
            </a>
        </div>`;
}

function chg(d) { go((currentImg + d + images.length) % images.length); }
function go(i) {
    currentImg = i;
    document.getElementById('mainImg').src = images[i];
    document.querySelectorAll('.img-dot').forEach((d,j) => d.classList.toggle('active', j===i));
}

function showError(msg) {
    document.getElementById('app').innerHTML = `<div class="error-box"><h2>Oops!</h2><p>${msg}</p><a href="/">← Back to SearchPadi</a></div>`;
}

load();
</script>
</body>
</html>
