<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SearchPadi - Product</title>
    <meta name="theme-color" content="#000000">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        #viewer { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; }
        #mainImg { width: 100%; height: 100%; object-fit: contain; }

        .top-bar {
            position: fixed; top: 0; left: 0; right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
            padding: 14px 16px 40px; z-index: 10;
        }
        .progress-lines { display: flex; gap: 4px; margin-bottom: 12px; }
        .progress-line { flex: 1; height: 2px; border-radius: 2px; background: rgba(255,255,255,0.35); }
        .progress-line.active { background: white; }

        .seller-info-row { display: flex; align-items: center; justify-content: space-between; }
        .seller-left { display: flex; align-items: center; gap: 10px; text-decoration: none; flex: 1; }

        .avatar-wrap { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
        .avatar-ring {
            position: absolute; inset: -3px; border-radius: 50%;
            border: 2.5px solid transparent;
            background: linear-gradient(#000, #000) padding-box,
                        linear-gradient(90deg, #7c3aed, #c4b5fd, #7c3aed) border-box;
            animation: spin-ring 1.8s linear infinite;
            box-shadow: 0 0 12px rgba(124,58,237,0.8);
        }
        @keyframes spin-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .avatar-img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; position: relative; z-index: 1; }

        .seller-name { font-size: 14px; font-weight: 600; color: white; }
        .seller-name-row { display: flex; align-items: center; gap: 5px; }
        .blue-tick { color: #60a5fa; display: flex; align-items: center; }
        .seller-location { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }
        .verified-tag {
            display: inline-flex; align-items: center; gap: 3px;
            background: #065f46; color: #34d399;
            font-size: 10px; font-weight: 700;
            padding: 2px 7px; border-radius: 20px; margin-top: 4px;
        }
        .close-btn { background: none; border: none; cursor: pointer; padding: 4px; }

        .nav-left, .nav-right { position: fixed; top: 0; bottom: 0; width: 33%; cursor: pointer; z-index: 5; }
        .nav-left { left: 0; }
        .nav-right { right: 0; }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,1) 65%, transparent 100%);
            padding: 16px 16px 30px; z-index: 10;
        }
        .about-btn {
            width: 100%; background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
            border: none; color: white; padding: 12px; border-radius: 10px;
            font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .product-title { font-size: 20px; font-weight: 700; color: white; margin-bottom: 12px; }

        .action-row { display: flex; gap: 10px; align-items: center; }
        .btn-wa {
            flex: 1; background: #16a34a; color: white; border: none;
            border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none;
        }
        .btn-like {
            width: 50px; height: 50px; border-radius: 12px;
            background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
            border: none; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s;
        }
        .btn-like:active { transform: scale(0.9); }

        .desc-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 30;
            display: flex; align-items: flex-end; animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .desc-sheet {
            background: #1c1c1e; border-radius: 20px 20px 0 0;
            padding: 20px 20px 36px; width: 100%;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .desc-handle { width: 36px; height: 4px; background: #444; border-radius: 2px; margin: 0 auto 16px; }
        .desc-label { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
        .desc-text { font-size: 15px; color: #d1d5db; line-height: 1.65; }

        .skeleton { background: linear-gradient(90deg,#111 25%,#222 50%,#111 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        .error-box { position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center; }
        .error-box h2 { color:#ef4444;font-size:22px;margin-bottom:8px; }
        .error-box p { color:#9ca3af;font-size:14px;margin-bottom:20px; }
        .error-box a { color:#a78bfa;text-decoration:none;font-weight:600;font-size:15px; }
    </style>
</head>
<body>

<div id="skeleton" style="position:fixed;inset:0;background:#111;">
    <div class="skeleton" style="width:100%;height:100%;"></div>
</div>

<div id="viewer" style="display:none;">
    <img id="mainImg" alt="Product" onerror="this.src='https://via.placeholder.com/400x600/6366f1/fff?text=Product'" />

    <div class="nav-left" onclick="changeImg(-1)"></div>
    <div class="nav-right" onclick="changeImg(1)"></div>

    <div class="top-bar">
        <div class="progress-lines" id="progressLines"></div>
        <div class="seller-info-row">
            <a class="seller-left" id="sellerLink" href="#">
                <div class="avatar-wrap">
                    <div class="avatar-ring"></div>
                    <img class="avatar-img" id="sellerAvatar" src="" alt="Seller" onerror="this.src='https://via.placeholder.com/80/6366f1/fff?text=S'" />
                </div>
                <div>
                    <div class="seller-name-row">
                        <span class="seller-name" id="sellerName"></span>
                        <span class="blue-tick" id="blueTick" style="display:none;">
                            <svg width="15" height="15" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                            </svg>
                        </span>
                    </div>
                    <div class="seller-location" id="sellerLocation"></div>
                    <div class="verified-tag" id="verifiedTag" style="display:none;">✓ Verified Seller</div>
                </div>
            </a>
            <button class="close-btn" onclick="history.back()">
                <svg width="28" height="28" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="about-btn" id="aboutBtn" onclick="showDesc()" style="display:none;">
            <svg width="18" height="18" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            About Product
        </button>
        <div class="product-title" id="productTitle"></div>
        <div class="action-row">
            <a class="btn-wa" id="waBtn" href="#" target="_blank">
                <svg width="20" height="20" fill="white" viewBox="0 0 24 24">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                Ask for Price
            </a>
            <button class="btn-like" onclick="toggleLike()">
                <svg id="likeIcon" width="24" height="24" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<div class="desc-backdrop" id="descBackdrop" style="display:none;" onclick="hideDesc()">
    <div class="desc-sheet" onclick="event.stopPropagation()">
        <div class="desc-handle"></div>
        <div class="desc-label">About Product</div>
        <div class="desc-text" id="descText"></div>
    </div>
</div>

<div id="errorBox" style="display:none;" class="error-box">
    <h2>Oops!</h2>
    <p id="errorMsg">Something went wrong.</p>
    <a href="https://searchpadi-phi.vercel.app">Back to SearchPadi</a>
</div>

<script>
const SUPABASE_URL = 'https://fxjnbqymkdvuqfeagpur.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4am5icXlta2R2dXFmZWFncHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMTE0NTUsImV4cCI6MjA4NjU4NzQ1NX0.qcQPStoxVPdJfAEDJ-f0xiu_EQkRnZd2c2uDIhMMAdg';
const H = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY };

async function get(table, params) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers: H });
    return res.json();
}

let images = [], currentImg = 0, liked = false, likesCount = 0, productId = null, currentSeller = null, productName = '';

async function load() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) return showError('No product specified.');
    productId = id;
    try {
        const products = await get('products', `id=eq.${encodeURIComponent(id)}&select=*`);
        if (!products?.length) return showError('Product not found.');
        const p = products[0];
        const sellers = await get('profiles', `id=eq.${encodeURIComponent(p.seller_id)}&select=*`);
        const seller = sellers?.[0];
        render(p, seller);
        if (seller) incrementViews(seller);
    } catch(e) {
        showError('Failed to load. Check your connection.');
    }
}

async function incrementViews(seller) {
    try {
        const currentViews = seller.views || 0;
        await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${seller.id}`, {
            method: 'PATCH',
            headers: { ...H, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
            body: JSON.stringify({ views: currentViews + 1 })
        });
        // Fire push notification like the main app does
        try {
            fetch('https://fxjnbqymkdvuqfeagpur.supabase.co/functions/v1/send-push', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    seller_id: seller.id,
                    title: '👀 Someone viewed your product!',
                    body: `Your listing just got a view from a shared link!`
                })
            });
        } catch(e) {}
    } catch(e) {}
}

function render(p, seller) {
    images = (p.images && p.images.length) ? p.images : ['https://via.placeholder.com/400x600/6366f1/fff?text=Product'];
    likesCount = p.likes || 0;
    currentSeller = seller;
    productName = p.name;
    document.title = p.name + ' - SearchPadi';

    document.getElementById('productTitle').textContent = p.name;

    // Progress lines
    const lines = document.getElementById('progressLines');
    lines.innerHTML = images.map((_, i) => `<div class="progress-line${i===0?' active':''}"></div>`).join('');

    document.getElementById('mainImg').src = images[0];

    // Seller
    if (seller) {
        document.getElementById('sellerAvatar').src = seller.profile_photo || 'https://via.placeholder.com/80/6366f1/fff?text=S';
        document.getElementById('sellerName').textContent = seller.business_name || seller.full_name || 'Seller';
        document.getElementById('sellerLocation').textContent = '📍 ' + (seller.location || 'Nigeria');
        document.getElementById('sellerLink').href = '/seller.html?id=' + seller.id;

        if (seller.is_verified) {
            document.getElementById('blueTick').style.display = 'inline-flex';
            document.getElementById('verifiedTag').style.display = 'inline-flex';
        }

        const sellerDisplayName = seller.business_name || seller.full_name || 'there';
        const wa = (seller.whatsapp || '').replace(/\D/g, '');
        const msg = encodeURIComponent(`Hi ${sellerDisplayName}, I saw your "${p.name}" on SearchPadi. Is it still available?`);
        document.getElementById('waBtn').href = wa ? `https://wa.me/${wa}?text=${msg}` : '#';
    }

    // About Product
    if (p.description) {
        document.getElementById('aboutBtn').style.display = 'flex';
        document.getElementById('descText').innerHTML = p.description.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    document.getElementById('skeleton').style.display = 'none';
    document.getElementById('viewer').style.display = 'block';
}

function changeImg(dir) {
    goTo((currentImg + dir + images.length) % images.length);
}

function goTo(i) {
    currentImg = i;
    document.getElementById('mainImg').src = images[i];
    document.querySelectorAll('.progress-line').forEach((l, j) => l.classList.toggle('active', j === i));
}

async function toggleLike() {
    liked = !liked;
    likesCount = liked ? likesCount + 1 : Math.max(0, likesCount - 1);
    const icon = document.getElementById('likeIcon');
    icon.setAttribute('fill', liked ? '#ef4444' : 'none');
    icon.setAttribute('stroke', liked ? '#ef4444' : 'white');
    if (productId) {
        try {
            await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${productId}`, {
                method: 'PATCH',
                headers: { ...H, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                body: JSON.stringify({ likes: likesCount })
            });
        } catch(e) {}
    }
}

function showDesc() { document.getElementById('descBackdrop').style.display = 'flex'; }
function hideDesc() { document.getElementById('descBackdrop').style.display = 'none'; }

function showError(msg) {
    document.getElementById('skeleton').style.display = 'none';
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('errorBox').style.display = 'flex';
}

load();
</script>
</body>
</html>
