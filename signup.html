<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join SearchPadi as a Seller</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0f0f0f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes typing { 0%,60%,100% { opacity: 0.2; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1.2); } }
        .msg-enter { animation: slideUp 0.35s ease-out; }
        .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #a78bfa; animation: typing 1.2s ease-in-out infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { createClient } = supabase;

    const SUPABASE_URL = 'https://fxjnbqymkdvuqfeagpur.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4am5icXlta2R2dXFmZWFncHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMTE0NTUsImV4cCI6MjA4NjU4NzQ1NX0.qcQPStoxVPdJfAEDJ-f0xiu_EQkRnZd2c2uDIhMMAdg';
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, autoRefreshToken: true } });

    const DEFAULT_PROFILE_IMAGE = "https://via.placeholder.com/400x400/6366f1/ffffff?text=Profile";
    const SOMTO_AVATAR = "https://i.postimg.cc/KcrmDRbc/grok-1771024499914.jpg";

    const formatPhoneNumber = (phone) => {
        phone = phone.replace(/\D/g, '');
        if (phone.startsWith('0')) phone = phone.substring(1);
        if (phone.startsWith('234')) phone = phone.substring(3);
        return '+234' + phone;
    };

    const CATEGORIES = [
        { text: '📱 Phones & Gadgets', value: 'phones' },
        { text: '💻 Electronics', value: 'electronics' },
        { text: '👟 Shoes & Footwear', value: 'shoes' },
        { text: '👔 Clothes & Fashion', value: 'fashion' },
        { text: '🏠 Home & Furniture', value: 'furniture' },
        { text: '🍕 Foods & Edibles', value: 'foods' },
        { text: '💄 Beauty & Personal Care', value: 'beauty' },
        { text: '🛒 General Store', value: 'general' },
    ];

    const STEPS = ['welcome', 'business_name', 'category', 'location', 'bio', 'whatsapp', 'email', 'photo', 'password', 'done'];

    function App() {
        const [messages, setMessages] = useState([]);
        const [step, setStep] = useState('welcome');
        const [typing, setTyping] = useState(false);
        const [inputValue, setInputValue] = useState('');
        const [formData, setFormData] = useState({});
        const [uploading, setUploading] = useState(false);
        const [submitting, setSubmitting] = useState(false);
        const [error, setError] = useState('');
        const [loggedIn, setLoggedIn] = useState(false);
        const [checkingAuth, setCheckingAuth] = useState(true);
        const [showLoginModal, setShowLoginModal] = useState(false);
        const [loginPhone, setLoginPhone] = useState('');
        const [loginPassword, setLoginPassword] = useState('');
        const [loginError, setLoginError] = useState('');
        const [loginLoading, setLoginLoading] = useState(false);
        const [newUserId, setNewUserId] = useState(null);
        const bottomRef = useRef(null);
        const fileRef = useRef(null);

        // Check if already logged in
        useEffect(() => {
            db.auth.getSession().then(({ data }) => {
                if (data.session) {
                    setLoggedIn(true);
                }
                setCheckingAuth(false);
            });
        }, []);

        useEffect(() => {
            if (!checkingAuth && !loggedIn) {
                addSomtoMessage("Hi there! 👋 I'm *Somto*, your SearchPadi assistant.\n\nI'm here to get your business listed so buyers can find you. It only takes a few minutes!\n\nLet's start — *what's your business name?*");
                setStep('business_name');
            }
        }, [checkingAuth, loggedIn]);

        useEffect(() => {
            bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
        }, [messages, typing]);

        const addSomtoMessage = (text, buttons = null, delay = 0) => {
            return new Promise(resolve => {
                setTyping(true);
                setTimeout(() => {
                    setTyping(false);
                    setMessages(prev => [...prev, { id: Date.now(), from: 'somto', text, buttons }]);
                    resolve();
                }, delay || 1000);
            });
        };

        const addUserMessage = (text) => {
            setMessages(prev => [...prev, { id: Date.now() + 1, from: 'user', text }]);
        };

        const handleUserInput = async (value, displayText = null) => {
            const text = displayText || value;
            addUserMessage(text);
            setInputValue('');
            setError('');
            await processStep(step, value);
        };

        const processStep = async (currentStep, value) => {
            if (currentStep === 'business_name') {
                if (!value.trim()) { setError('Please enter your business name'); return; }
                setFormData(p => ({ ...p, businessName: value.trim() }));
                await addSomtoMessage(`Great name, *${value.trim()}*! 🎉\n\nNow, what category best describes what you sell?`, CATEGORIES);
                setStep('category');

            } else if (currentStep === 'category') {
                const cat = CATEGORIES.find(c => c.value === value);
                setFormData(p => ({ ...p, category: value }));
                await addSomtoMessage(`Perfect! Now, *where is your business located?*\n\nJust the city or area — for example: *Lagos Island*, *Abuja*, *Port Harcourt*`);
                setStep('location');

            } else if (currentStep === 'location') {
                if (!value.trim()) { setError('Please enter your location'); return; }
                setFormData(p => ({ ...p, location: value.trim() }));
                await addSomtoMessage(`Got it — *${value.trim()}*! 📍\n\nNow we need customers to understand what your business is about.\n\nPlease give me a short write-up to display on your *Bio* — what makes your business special?`);
                setStep('bio');

            } else if (currentStep === 'bio') {
                if (!value.trim()) { setError('Please write a short bio'); return; }
                setFormData(p => ({ ...p, bio: value.trim() }));
                await addSomtoMessage(`That's a great bio! ✍️\n\nWhat's your *WhatsApp number*? This is how buyers will contact you directly.\n\n(e.g. 08012345678)`);
                setStep('whatsapp');

            } else if (currentStep === 'whatsapp') {
                const digits = value.replace(/\D/g, '');
                if (digits.length < 10) { setError('Please enter a valid WhatsApp number'); return; }
                setFormData(p => ({ ...p, whatsappNumber: value.trim() }));
                await addSomtoMessage(`Perfect! 📱\n\nNow enter your *email address* — this will be used to log in to your account.`);
                setStep('email');

            } else if (currentStep === 'email') {
                if (!value.includes('@') || !value.includes('.')) { setError('Please enter a valid email address'); return; }
                // Check if email already exists
                const { data: existing } = await db.from('profiles').select('id').eq('email', value.trim().toLowerCase()).maybeSingle();
                if (existing) { setError('This email is already registered. Try a different one.'); return; }
                setFormData(p => ({ ...p, email: value.trim().toLowerCase() }));
                await addSomtoMessage(`Almost there! 🎯\n\nUp next — add a *profile photo* for your business. This is what buyers will see first.\n\nTap the button below to upload your photo.`, [{ text: '📷 Upload Photo', value: '__upload__' }, { text: 'Skip for now', value: '__skip_photo__' }]);
                setStep('photo');

            } else if (currentStep === 'photo') {
                if (value === '__upload__') {
                    fileRef.current?.click();
                    return;
                }
                if (value === '__skip_photo__') {
                    setFormData(p => ({ ...p, profilePhoto: null }));
                    await addSomtoMessage(`No worries, you can add it later! 😊\n\nLast step — create a *password* for your account.\n\n(At least 6 characters)`);
                    setStep('password');
                }

            } else if (currentStep === 'password') {
                if (value.length < 6) { setError('Password must be at least 6 characters'); return; }
                setFormData(p => ({ ...p, password: value }));
                await submitSignup({ ...formData, password: value });
            }
        };

        const handlePhotoUpload = async (e) => {
            const file = e.target.files?.[0];
            if (!file) return;
            setUploading(true);
            addUserMessage('📷 Uploading photo...');
            try {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const base64 = ev.target.result;
                    setFormData(p => ({ ...p, profilePhoto: base64 }));
                    setUploading(false);
                    setMessages(prev => {
                        const updated = [...prev];
                        updated[updated.length - 1] = { ...updated[updated.length - 1], text: '📷 Photo uploaded!' };
                        return updated;
                    });
                    await addSomtoMessage(`Looking great! 🔥\n\nLast step — create a *password* for your account.\n\n(At least 6 characters)`);
                    setStep('password');
                };
                reader.readAsDataURL(file);
            } catch (err) {
                setUploading(false);
                setError('Photo upload failed. Try again or skip.');
            }
        };

        const submitSignup = async (data) => {
            setSubmitting(true);
            setTyping(true);
            try {
                const formattedPhone = formatPhoneNumber(data.whatsappNumber);

                const { data: authData, error: authError } = await db.auth.signUp({
                    email: data.email,
                    password: data.password,
                    options: { data: { phone: formattedPhone, business_name: data.businessName } }
                });
                if (authError) throw authError;
                if (!authData.user) throw new Error('Account creation failed');

                // Check free verified slots
                const { data: appSettings } = await db.from('app_settings').select('free_verified_count').eq('id', 1).single();
                const freeCount = appSettings?.free_verified_count || 0;
                const isFreeVerified = freeCount < 5;
                if (isFreeVerified) {
                    await db.from('app_settings').update({ free_verified_count: freeCount + 1 }).eq('id', 1);
                }

                const profileData = {
                    id: authData.user.id,
                    business_name: data.businessName,
                    email: data.email,
                    category: data.category,
                    location: data.location,
                    phone: formattedPhone,
                    whatsapp: formattedPhone,
                    bio: data.bio || 'New seller on SearchPadi',
                    profile_photo: data.profilePhoto || DEFAULT_PROFILE_IMAGE,
                    subscription_plan: 'free',
                    is_verified: false,
                    is_free_verified: isFreeVerified,
                    account_status: 'approved',
                    views: 0,
                    created_at: new Date().toISOString()
                };

                const { error: profileError } = await db.from('profiles').insert([profileData]).select();
                if (profileError) throw new Error(profileError.message);

                setTyping(false);
                setNewUserId(authData.user.id);
                setStep('done');
                setMessages(prev => [...prev, {
                    id: Date.now(),
                    from: 'somto',
                    text: `🎉 Welcome to SearchPadi, *${data.businessName}*!\n\nYour business is now live and buyers can find you.\n\nHere's what to do next:\n• Add your products on the app\n• Run a campaign to get your first customers\n• Keep your WhatsApp active for buyer messages\n\nTap below to go to your profile!`,
                    buttons: [{ text: '🚀 Open SearchPadi', value: '__open_app__' }]
                }]);

            } catch (err) {
                setTyping(false);
                setSubmitting(false);
                setError(err.message || 'Something went wrong. Please try again.');
            }
        };

        const handleLogin = async () => {
            setLoginError('');
            if (!loginPhone || !loginPassword) { setLoginError('Please fill in all fields'); return; }
            setLoginLoading(true);
            try {
                const { data: authData, error: authError } = await db.auth.signInWithPassword({
                    email: loginPhone.trim().toLowerCase(), password: loginPassword
                });
                if (authError) throw authError;
                const { data: profile } = await db.from('profiles').select('*').eq('id', authData.user.id).single();
                if (!profile) throw new Error('Profile not found');
                // Redirect back to app
                // Open main app with seller ID — deep link opens their full profile
                window.location.href = 'https://searchpadi-phi.vercel.app?seller=' + authData.user.id;
            } catch (err) {
                setLoginError(err.message?.includes('Invalid') ? 'Wrong phone or password' : err.message);
            } finally {
                setLoginLoading(false);
            }
        };

        const handleButtonClick = (value, displayText) => {
            if (value === '__open_app__') {
                window.location.href = 'https://searchpadi-phi.vercel.app?seller=' + newUserId;
                return;
            }
            handleUserInput(value, displayText);
        };

        if (checkingAuth) {
            return (
                <div className="min-h-screen bg-[#0f0f0f] flex items-center justify-center">
                    <div className="flex gap-2">
                        <div className="dot"></div><div className="dot"></div><div className="dot"></div>
                    </div>
                </div>
            );
        }

        if (loggedIn) {
            return (
                <div className="min-h-screen bg-[#0f0f0f] flex items-center justify-center p-4">
                    <div className="text-center max-w-sm">
                        <img src={SOMTO_AVATAR} className="w-16 h-16 rounded-full mx-auto mb-4 object-cover" />
                        <h2 className="text-white text-xl font-bold mb-2">You're already registered!</h2>
                        <p className="text-gray-400 text-sm mb-6">Your SearchPadi seller account is active.</p>
                        <a href="https://searchpadi-phi.vercel.app" className="block w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl text-center transition-colors">
                            Open SearchPadi
                        </a>
                    </div>
                </div>
            );
        }

        return (
            <div className="min-h-screen bg-[#0f0f0f] flex flex-col max-w-lg mx-auto">
                {/* Header */}
                <div className="bg-gradient-to-r from-purple-700 to-purple-900 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
                    <div className="flex items-center gap-3">
                        <img src={SOMTO_AVATAR} className="w-9 h-9 rounded-full object-cover border-2 border-purple-400" />
                        <div>
                            <p className="text-white font-bold text-sm">Somto</p>
                            <p className="text-purple-300 text-xs">SearchPadi Assistant</p>
                        </div>
                    </div>
                    <button onClick={() => setShowLoginModal(true)}
                        className="bg-white text-purple-700 text-sm font-bold px-4 py-2.5 rounded-lg hover:bg-purple-50 transition-colors">
                        Login
                    </button>
                </div>

                {/* Login Modal */}
                {showLoginModal && (
                    <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4" onClick={() => setShowLoginModal(false)}>
                        <div className="bg-[#1a1a1a] rounded-2xl w-full max-w-sm border border-gray-800 p-6" onClick={e => e.stopPropagation()}>
                            <div className="flex justify-between items-center mb-5">
                                <h2 className="text-white text-2xl font-bold">Seller Login</h2>
                                <button onClick={() => setShowLoginModal(false)} className="text-gray-400 hover:text-white text-lg">✕</button>
                            </div>
                            {loginError && <p className="text-red-400 text-sm mb-3 bg-red-500/10 border border-red-500/30 px-3 py-2 rounded-lg">{loginError}</p>}
                            <div className="space-y-3">
                                <div>
                                    <label className="text-gray-400 text-sm mb-1 block">Email Address</label>
                                    <input type="email" value={loginPhone}
                                        onChange={e => setLoginPhone(e.target.value)}
                                        placeholder="your@email.com"
                                        className="w-full bg-[#2a2a2a] border border-gray-700 text-white rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-purple-500" />
                                </div>
                                <div>
                                    <label className="text-gray-400 text-sm mb-1 block">Password</label>
                                    <input type="password" value={loginPassword}
                                        onChange={e => setLoginPassword(e.target.value)}
                                        placeholder="Your password"
                                        className="w-full bg-[#2a2a2a] border border-gray-700 text-white rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-purple-500" />
                                </div>
                                <button onClick={handleLogin} disabled={loginLoading}
                                    className="w-full bg-purple-600 hover:bg-purple-700 disabled:opacity-50 text-white font-bold py-3 rounded-xl transition-colors">
                                    {loginLoading ? 'Logging in...' : 'Login & Go to Profile'}
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {/* Messages */}
                <div className="flex-1 overflow-y-auto p-4 space-y-3 pb-32">
                    {messages.map(msg => (
                        <div key={msg.id} className={`msg-enter flex ${msg.from === 'user' ? 'justify-end' : 'justify-start'} gap-2`}>
                            {msg.from === 'somto' && (
                                <img src={SOMTO_AVATAR} className="w-9 h-9 rounded-full object-cover flex-shrink-0 mt-1" />
                            )}
                            <div className={`max-w-[80%]`}>
                                <div className={`rounded-2xl px-5 py-4 text-base leading-relaxed whitespace-pre-line ${
                                    msg.from === 'somto'
                                        ? 'bg-[#1e1e2e] text-white rounded-tl-none'
                                        : 'bg-purple-600 text-white rounded-tr-none'
                                }`}
                                    dangerouslySetInnerHTML={{ __html: msg.text.replace(/\*(.*?)\*/g, '<strong>$1</strong>') }}
                                />
                                {msg.buttons && (
                                    <div className="flex flex-wrap gap-2 mt-2">
                                        {msg.buttons.map((btn, i) => (
                                            <button key={i} onClick={() => handleButtonClick(btn.value, btn.text)}
                                                className="bg-purple-700 hover:bg-purple-600 text-white text-sm font-semibold px-4 py-2.5 rounded-xl transition-colors border border-purple-500">
                                                {btn.text}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    ))}

                    {/* Typing indicator */}
                    {typing && (
                        <div className="flex items-center gap-2">
                            <img src={SOMTO_AVATAR} className="w-7 h-7 rounded-full object-cover flex-shrink-0" />
                            <div className="bg-[#1e1e2e] rounded-2xl rounded-tl-none px-4 py-3 flex gap-1 items-center">
                                <div className="dot"></div><div className="dot"></div><div className="dot"></div>
                            </div>
                        </div>
                    )}
                    <div ref={bottomRef} />
                </div>

                {/* Hidden file input */}
                <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handlePhotoUpload} />

                {/* Input Area */}
                {step !== 'done' && !['photo', 'category'].includes(step) && (
                    <div className="fixed bottom-0 left-0 right-0 max-w-lg mx-auto bg-[#0f0f0f] border-t border-gray-800 p-3">
                        {error && <p className="text-red-400 text-xs mb-2 px-1">{error}</p>}
                        <div className="flex gap-2">
                            <input
                                type={step === 'password' ? 'password' : step === 'email' ? 'email' : 'text'}
                                value={inputValue}
                                onChange={e => setInputValue(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && inputValue.trim() && handleUserInput(inputValue.trim())}
                                placeholder={
                                    step === 'business_name' ? 'Your business name...' :
                                    step === 'location' ? 'Your city or area...' :
                                    step === 'bio' ? 'Tell buyers about your business...' :
                                    step === 'whatsapp' ? '080XXXXXXXX' :
                                    step === 'email' ? 'your@email.com' :
                                    step === 'password' ? 'Create a password...' : 'Type here...'
                                }
                                className="flex-1 bg-[#1a1a1a] border border-gray-700 text-white rounded-xl px-4 py-4 text-base focus:outline-none focus:border-purple-500 placeholder-gray-600"
                                disabled={submitting || uploading}
                            />
                            <button
                                onClick={() => inputValue.trim() && handleUserInput(inputValue.trim())}
                                disabled={!inputValue.trim() || submitting || uploading}
                                className="bg-purple-600 hover:bg-purple-700 disabled:opacity-40 text-white w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0 transition-colors"
                            >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
